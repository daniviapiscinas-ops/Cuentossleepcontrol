<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060916" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Sueños de Luna — Cuentos de Buenas Noches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep:     #060916;
      --bg-card:     rgba(14,20,55,0.82);
      --gold:        #f0c060;
      --gold-dim:    rgba(240,192,96,0.15);
      --gold-border: rgba(240,192,96,0.28);
      --soft:        #9bb8ff;
      --moon:        #e8dcc8;
      --text:        #dde4f4;
      --muted:       #7a8fbb;
      --radius:      20px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-h:       72px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg-deep); color:var(--text); min-height:100dvh; overflow-x:hidden; padding-top:var(--safe-top); }

    #stars-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .nebula { position:fixed; border-radius:50%; filter:blur(100px); opacity:0.28; pointer-events:none; z-index:0; }
    .n1 { width:500px; height:500px; background:#1a2a8a; top:-120px; right:-100px; animation:drift 20s ease-in-out infinite alternate; }
    .n2 { width:360px; height:360px; background:#3a1060; bottom:15%; left:-80px; animation:drift 25s ease-in-out infinite alternate-reverse; }
    .n3 { width:280px; height:280px; background:#0a3060; bottom:-60px; right:5%; animation:drift 17s ease-in-out infinite alternate; }
    @keyframes drift { from{transform:translate(0,0) scale(1);} to{transform:translate(22px,35px) scale(1.1);} }

    .app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 16px; padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 20px); }

    header { text-align:center; padding:44px 0 28px; }
    .moon-icon { font-size:50px; display:block; margin-bottom:14px; animation:moonFloat 4s ease-in-out infinite; filter:drop-shadow(0 0 20px rgba(240,192,96,0.65)); }
    @keyframes moonFloat { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-10px) rotate(5deg);} }
    header h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(1.9rem,8vw,2.7rem); font-weight:300; color:var(--moon); letter-spacing:0.01em; line-height:1.1; }
    header h1 em { font-style:italic; color:var(--gold); }
    header p { margin-top:8px; font-size:0.78rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

    .current-age-badge { display:flex; align-items:center; justify-content:center; gap:10px; margin:0 0 24px; }
    .age-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(155,184,255,0.2),transparent); }
    .age-label { font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:100px; padding:4px 14px; white-space:nowrap; }

    .stories-grid { display:flex; flex-direction:column; gap:14px; }

    .story-card {
      background:var(--bg-card); border:1px solid rgba(155,184,255,0.1);
      border-radius:var(--radius); padding:18px 18px 14px;
      cursor:pointer; backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      transition:transform .18s,box-shadow .18s,border-color .18s,opacity .35s;
      position:relative; overflow:hidden;
      -webkit-tap-highlight-color:transparent; min-height:48px;
      opacity:0; transform:translateY(22px);
    }
    .story-card.visible { opacity:1; transform:translateY(0); }
    .story-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(80,130,255,0.1),transparent 55%); opacity:0; transition:opacity .3s; }
    .story-card:active { transform:scale(0.975); }
    .story-card:hover { border-color:rgba(155,184,255,0.28); box-shadow:0 8px 36px rgba(80,130,255,0.1); }
    .story-card:hover::before { opacity:1; }
    .story-card:hover .card-arrow { transform:translateX(4px); opacity:1; }

    .ribbon { position:absolute; top:14px; right:-2px; font-size:0.58rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:3px 12px 3px 8px; border-radius:4px 0 0 4px; color:#060916; }
    .ribbon.short { background:#88d4ab; } .ribbon.medium { background:var(--gold); } .ribbon.long { background:#c09aff; }

    .card-top { display:flex; align-items:flex-start; gap:12px; }
    .card-emoji { font-size:2rem; line-height:1; flex-shrink:0; filter:drop-shadow(0 2px 8px rgba(240,192,96,.3)); margin-top:2px; }
    .card-meta { flex:1; min-width:0; padding-right:32px; }
    .card-tag { display:inline-block; font-size:0.62rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:100px; padding:2px 9px; margin-bottom:5px; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; color:var(--moon); line-height:1.2; }
    .card-desc { margin-top:5px; font-size:0.78rem; color:var(--muted); line-height:1.5; }
    .card-arrow { font-size:1.1rem; color:var(--soft); opacity:.5; transition:transform .2s,opacity .2s; flex-shrink:0; margin-top:2px; }
    .card-footer { display:flex; align-items:center; gap:6px; margin-top:12px; padding-top:10px; border-top:1px solid rgba(155,184,255,0.08); }
    .card-time { font-size:0.7rem; color:var(--muted); display:flex; align-items:center; gap:4px; }
    .card-dot { width:3px; height:3px; border-radius:50%; background:var(--muted); opacity:.35; margin:0 3px; }
    .card-age { font-size:0.7rem; color:var(--muted); }

    .tab-bar { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(8,13,38,0.94); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-top:1px solid rgba(155,184,255,0.12); display:flex; align-items:stretch; padding-bottom:var(--safe-bottom); height:calc(var(--tab-h) + var(--safe-bottom)); }
    .tab-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; background:none; border:none; cursor:pointer; color:var(--muted); -webkit-tap-highlight-color:transparent; transition:color .2s; padding:10px 4px; min-height:48px; position:relative; }
    .tab-btn::after { content:''; position:absolute; bottom:0; left:20%; right:20%; height:2px; background:var(--gold); border-radius:2px 2px 0 0; opacity:0; transform:scaleX(0); transition:opacity .25s,transform .25s; }
    .tab-btn.active { color:var(--gold); }
    .tab-btn.active::after { opacity:1; transform:scaleX(1); }
    .tab-icon { font-size:1.35rem; line-height:1; }
    .tab-label { font-size:0.6rem; font-weight:500; letter-spacing:0.04em; }

    .modal-overlay { position:fixed; inset:0; background:rgba(3,6,18,0.9); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .3s ease; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-sheet { width:100%; max-width:480px; margin:0 auto; background:linear-gradient(160deg,#0d1535 0%,#080d22 100%); border-top:1px solid rgba(155,184,255,0.15); border-radius:28px 28px 0 0; max-height:94dvh; overflow-y:auto; padding:14px 24px calc(28px + var(--safe-bottom)); transform:translateY(50px); transition:transform .38s cubic-bezier(.34,1.36,.64,1); }
    .modal-overlay.open .modal-sheet { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; background:rgba(155,184,255,.2); border-radius:100px; margin:0 auto 18px; }
    .modal-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
    .modal-emoji { font-size:2.6rem; filter:drop-shadow(0 4px 14px rgba(240,192,96,.4)); }
    .modal-close { width:36px; height:36px; border-radius:50%; border:1px solid rgba(155,184,255,.2); background:rgba(155,184,255,.06); color:var(--muted); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transition:background .2s; }
    .modal-close:hover { background:rgba(155,184,255,.15); }
    .modal-tag { display:inline-block; font-size:0.62rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:100px; padding:2px 10px; margin-bottom:8px; }
    .modal-title { font-family:'Cormorant Garamond',serif; font-size:clamp(1.6rem,6vw,2.1rem); font-weight:400; color:var(--moon); line-height:1.15; margin-bottom:5px; }
    .modal-meta { display:flex; align-items:center; gap:6px; margin-bottom:22px; flex-wrap:wrap; }
    .modal-meta span { font-size:0.72rem; color:var(--muted); }
    .modal-meta .dot { width:3px; height:3px; border-radius:50%; background:var(--muted); opacity:.4; }
    .modal-divider { height:1px; background:linear-gradient(90deg,rgba(155,184,255,.2),transparent); margin-bottom:22px; }
    .modal-body { font-family:'Cormorant Garamond',serif; font-size:clamp(1.05rem,4vw,1.17rem); font-weight:300; line-height:1.88; color:#ccd8f0; }
    .modal-body p { margin-bottom:1.15em; }
    .modal-body h3 { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; color:var(--gold); margin:1.8em 0 0.6em; letter-spacing:0.04em; }
    .modal-body p:first-of-type::first-letter { font-size:3.4em; float:left; line-height:.75; margin:4px 10px 0 0; color:var(--gold); font-weight:600; }
    .story-end { text-align:center; color:var(--gold); font-size:1.4rem; margin-top:1em; }

    .empty-state { text-align:center; padding:60px 20px; }
    .empty-state .es-icon { font-size:3rem; margin-bottom:16px; opacity:.5; }
    .empty-state p { font-size:0.85rem; color:var(--muted); line-height:1.6; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(155,184,255,.2); border-radius:4px; }
  </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div class="nebula n1"></div><div class="nebula n2"></div><div class="nebula n3"></div>

<div class="app">
  <header>
    <span class="moon-icon">🌙</span>
    <h1>Sueños <em>de Luna</em></h1>
    <p>Cuentos de buenas noches</p>
  </header>
  <div class="current-age-badge">
    <span class="age-line"></span>
    <span class="age-label" id="ageLabel">2–4 años · Bebés y peques</span>
    <span class="age-line"></span>
  </div>
  <div class="stories-grid" id="storiesGrid"></div>
</div>

<nav class="tab-bar" id="tabBar" role="tablist">
  <button class="tab-btn active" data-age="2-4" role="tab" aria-selected="true"><span class="tab-icon">🐣</span><span class="tab-label">2–4 años</span></button>
  <button class="tab-btn" data-age="4-7" role="tab" aria-selected="false"><span class="tab-icon">🌟</span><span class="tab-label">4–7 años</span></button>
  <button class="tab-btn" data-age="7-10" role="tab" aria-selected="false"><span class="tab-icon">🔭</span><span class="tab-label">7–10 años</span></button>
  <button class="tab-btn" data-age="10+" role="tab" aria-selected="false"><span class="tab-icon">📖</span><span class="tab-label">10+ años</span></button>
</nav>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-emoji" id="modalEmoji"></div>
      <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-tag" id="modalTag"></div>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-meta">
      <span id="modalTime"></span><span class="dot"></span><span id="modalAge"></span>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const stories = {

/* ════════════════════════════════
   2–4 AÑOS  (11 cuentos)
════════════════════════════════ */
"2-4": [
  {
    emoji:"🐻", tag:"Animales", title:"El Osito y su Manta", desc:"El pequeño Pepo no puede dormirse sin su manta favorita.", time:"~3 min", len:"short",
    content:`<p>Pepo era un osito de pelo suave como las nubes. Cada noche, antes de dormir, buscaba su manta amarilla. La manta olía a lavanda y era tan blandita que daba ganas de abrazarla para siempre.</p><p>Una noche, la manta no estaba en la cama. Pepo miró debajo de la almohada. No. Miró detrás de la luna de peluche. Tampoco. Entonces su mamá osita llegó sonriendo.</p><p>—Pepo, mira —dijo, y sacó la manta del cesto de la ropa limpia. Olía a jabón de flores y estaba calentita de la secadora.</p><p>Pepo la abrazó muy fuerte, cerró sus ojitos de botón y en segundos ya estaba soñando con miel dorada y campos de margaritas. Y la manta lo abrazó de vuelta, toda la noche.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐰", tag:"Sueños", title:"Lua la Conejita de la Luna", desc:"Una conejita que vive en la luna visita a los niños que no pueden dormir.", time:"~3 min", len:"short",
    content:`<p>En la luna vive una conejita llamada Lua. Tiene las orejas largas, largas, y una cola pequeña como una bola de algodón. Cada noche, cuando el mundo se pone oscuro, Lua se sienta en el borde de la luna y mira hacia abajo.</p><p>Busca a los niños que todavía tienen los ojos abiertos. Cuando los encuentra, saca de su cestita una semillita de sueño y la sopla hacia la tierra.</p><p>La semillita vuela, vuela, entra por la ventana abierta y se posa despacito en los párpados del niño. Y entonces... los ojos se vuelven pesados, pesados, como si tuvieran gotitas de rocío.</p><p>Lua sonríe, mueve su cola de algodón y pasa al siguiente niño. Todas las noches hace lo mismo, sin cansarse, porque le encanta su trabajo.</p><p>Así que si esta noche tus ojos se cierran solos... ya sabes quién estuvo aquí.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌧️", tag:"Naturaleza", title:"La Nube que Quería ser Arcoíris", desc:"Una nube pequeña aprende que llorar también puede ser algo muy bonito.", time:"~4 min", len:"short",
    content:`<p>Todas las nubes del cielo eran blancas y esponjosas. Pero había una que era gris. Se llamaba Nimbi y estaba un poco triste porque cuando lloraba le salía lluvia, y las demás nubes decían que mojaba el picnic de los pájaros.</p><p>Un día, Nimbi lloró mucho, pero mucho. Y cuando paró de llover, el sol salió detrás de ella y algo mágico ocurrió: sus lágrimas se convirtieron en un arcoíris enorme y brillante de siete colores.</p><p>Los pájaros cantaron. Los árboles aplaudieron con sus hojas. Las flores levantaron la cabeza para ver mejor.</p><p>—¡Eres tú, Nimbi! —dijeron las otras nubes—. ¡Tus lágrimas hacen el arcoíris!</p><p>Nimbi entendió que lo que la hacía diferente era también lo más bonito que tenía. Y esa noche se durmió feliz, sabiendo que el arcoíris del día siguiente también sería suyo.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"⭐", tag:"Magia", title:"El Bebé Estrella", desc:"Una estrellita recién nacida aprende a brillar por primera vez.", time:"~3 min", len:"short",
    content:`<p>En el cielo más oscuro nació una estrellita muy pequeña. Era tan pequeña que casi no se veía. Las demás estrellas brillaban fuerte, pero la pequeña solo podía hacer un titilito, tilic, tilic.</p><p>—¿Cuándo brillaré de verdad? —preguntó.</p><p>La estrella más grande del cielo se acercó despacio. —Cada noche que alguien te mire y sonría, crecerás un poquito más —dijo.</p><p>Esa misma noche, una niña asomó la cabeza por la ventana de su cuarto. Miró al cielo y vio la estrellita pequeña titilando. Y sonrió.</p><p>La estrellita sintió algo cálido en su interior. Y brilló un poquito más. Tilic, tilic... tilic.</p><p>¿Cerraste los ojos? La estrellita te está mirando ahora mismo.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐱", tag:"Animales", title:"El Gatito que Perdió su Ronroneo", desc:"Mochi busca su ronroneo por toda la casa antes de dormir.", time:"~3 min", len:"short",
    content:`<p>Mochi era un gatito blanco con una mancha naranja en la oreja. Cada noche, cuando se acurrucaba en su cojín, hacía un sonido precioso: purr, purr, purr. Ese sonido era su ronroneo, y le ayudaba a quedarse dormido.</p><p>Pero una noche, Mochi abrió la boca para ronronear y... nada. Silencio. ¡Su ronroneo había desaparecido!</p><p>Buscó debajo del sofá. Nada. Miró dentro de la cesta de los juguetes. Nada. Se asomó al jardín. Tampoco.</p><p>Entonces su persona favorita lo tomó en brazos, lo apretó suavecito contra su pecho y empezó a tararear una melodía.</p><p>Y entonces, como por arte de magia, desde adentro de Mochi salió un hilo de sonido: purr... purr... purr. El ronroneo estaba escondido donde siempre: en el corazón. Solo necesitaba sentir calor para salir.</p><p>Esa noche, Mochi durmió roncando muy, muy feliz.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐘", tag:"Animales", title:"El Elefante que Soñaba en Pequeño", desc:"Elefantito aprende que los sueños no tienen que ser enormes para ser bonitos.", time:"~4 min", len:"short",
    content:`<p>Elefantito era muy pequeño para ser un elefante. Sus orejas eran pequeñas, su trompa era pequeña y sus pasos apenas hacían ruido. Los elefantes mayores soñaban con grandes llanuras y ríos enormes. Pero Elefantito soñaba con cosas pequeñitas.</p><p>Soñaba con una margarita de color amarillo. Con una gota de lluvia que caía despacio. Con el olor del pan recién hecho. Con una piedra redonda y suave junto al río.</p><p>—¿No quieres soñar con cosas grandes? —le preguntaron los mayores.</p><p>—Las cosas pequeñas también son bonitas —dijo Elefantito—. Y caben mejor en mi corazón pequeño.</p><p>Esa noche, Elefantito cerró sus ojitos redondos y soñó con una mariposa que se posó en la punta de su trompa. Era el mejor sueño del mundo.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🦉", tag:"Noche", title:"El Búho que Enseñaba a Dormir", desc:"El sabio Búho Teo tiene un truco secreto para quedarse dormido.", time:"~3 min", len:"short",
    content:`<p>En el árbol más grande del bosque vivía el búho Teo. Todos pensaban que los búhos no dormían nunca porque tienen los ojos muy abiertos. Pero Teo sí dormía, y dormía muy bien.</p><p>Una noche, una ardillita llamada Nuez llegó corriendo. —¡Teo! ¡No puedo dormir! Mi cabeza no para de pensar.</p><p>Teo bajó una rama, se colocó a su lado y dijo: —Cierra los ojos. Respira muy despacio. Uno, dos, tres. Piensa en algo suave: una nube, una pluma, el musgo del árbol.</p><p>Nuez cerró los ojos. Respiró. Pensó en el musgo verde y esponjoso.</p><p>—¿Ya? —preguntó Teo.</p><p>Pero Nuez no respondió. Ya estaba dormida, con una sonrisita en la cara.</p><p>Teo la tapó con una hoja grande y suave, y volvió a su rama a mirar las estrellas.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌊", tag:"Naturaleza", title:"Las Olas que Cantaban Nanas", desc:"Las olas del mar tienen una canción especial para los niños que no duermen.", time:"~3 min", len:"short",
    content:`<p>El mar tiene muchos sonidos. A veces ruge como un león. A veces susurra como un secreto. Pero de noche, cuando todo el mundo se va a la cama, el mar canta nanas.</p><p>Chsss... chsss... chsss... hacen las olitas al llegar a la orilla. Es una canción sin palabras, pero que todo el mundo entiende: Ya es de noche. Ya puedes descansar. Yo cuido la orilla mientras tú duermes.</p><p>Una niña llamada Marina vivía cerca del mar. Cada noche abría la ventana y escuchaba. Chsss... chsss... chsss...</p><p>Sus ojos se iban cerrando solos, como si las olas los llevaran con ellos al viajar hacia la orilla. Y se dormía pensando en peces de colores, en conchas rosadas, en el sol del día siguiente.</p><p>El mar nunca se cansa de cantar. Esta noche, si escuchas con mucho cuidado, quizás lo oigas tú también.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐸", tag:"Animales", title:"La Ranita y su Hoja de Lirio", desc:"Saltín busca la hoja más blanda del estanque para pasar la noche.", time:"~3 min", len:"short",
    content:`<p>En el estanque del parque vivía una ranita verde llamada Saltín. Cada noche tenía que encontrar la mejor hoja de lirio para dormir: ni muy pequeña, ni muy mojada, ni con bichos que hicieran cosquillas.</p><p>Esta noche probó la hoja de la esquina norte. Demasiado fría. Probó la del centro. Demasiado mecediza. Probó una pequeñita junto a las cañas. Perfecta.</p><p>—Esta es mía —dijo, y se acomodó haciendo un ovillo verde.</p><p>La luna se reflejó en el agua del estanque justo debajo de él, como una segunda luna solo para Saltín. Las ranas vecinas empezaron su coro de croac, croac, croac... que en lengua de rana significa «buenas noches».</p><p>Saltín cerró sus grandes ojos dorados y dejó que el croac-nana lo llevara a soñar con moscas de colores y saltos altísimos.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌻", tag:"Naturaleza", title:"El Girasol que Dormía de Noche", desc:"El girasol Solín aprende que descansar también es importante.", time:"~4 min", len:"short",
    content:`<p>Solín era un girasol muy trabajador. Todo el día miraba al sol: primero hacia el este, luego al sur, luego al oeste. Seguía la luz durante horas sin parar.</p><p>Cuando llegaba la noche y el sol se escondía, Solín se quedaba muy triste. —¡Se fue la luz! —decía—. ¡No quiero que se vaya!</p><p>Pero su amiga la abeja Meli se posó en su pétalo y le dijo: —El sol descansa de noche para brillar más fuerte mañana. Tú también tienes que descansar, Solín.</p><p>—¿Y si me duermo y no llega el sol? —preguntó Solín.</p><p>—Siempre vuelve —dijo Meli—. Siempre.</p><p>Solín cerró sus pétalos despacio, como si fueran párpados amarillos, y se quedó dormido. Y a la mañana siguiente, el sol volvió justo como había prometido. Solín lo vio aparecer por el este y abrió sus pétalos de golpe, más feliz que nunca.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🦋", tag:"Magia", title:"La Mariposa que Tejía Sueños", desc:"Una mariposa azul vuela de cama en cama tejiendo sueños bonitos.", time:"~3 min", len:"short",
    content:`<p>Cuando todos duermen, llega una mariposa azul que nadie ve despierto. Se llama Oniria y lleva entre sus alas un hilo muy fino, más fino que una telaraña, más brillante que el rocío.</p><p>Oniria vuela de cama en cama. Cuando encuentra a un niño dormido, saca su hilo y empieza a tejer: colores, formas, lugares, risas. Con cada aleteo añade algo bonito al sueño.</p><p>Si sueñas con un bosque encantado, fue Oniria quien plantó los árboles. Si sueñas que vuelas, fue ella quien te prestó sus alas por un rato. Si sueñas con algo tan bonito que al despertar quieres volver a él, es porque Oniria tejió muy bien esa noche.</p><p>Esta noche ya está volando hacia tu cuarto. Cierra los ojos y espérala. Llega más rápido cuando los niños están muy quietos y muy, muy tranquilos.</p><div class="story-end">✦ · ✦</div>`
  }
],

   4–7 AÑOS  (11 cuentos)

"4-7": [
  {
    emoji:"🦊", tag:"Amistad", title:"El Zorro y la Linterna Rota", desc:"Un zorrito aprende que la oscuridad también puede ser un hogar.", time:"~5 min", len:"medium",
    content:`<p>El zorrito Rolo tenía miedo a la oscuridad. Cada noche, antes de dormir, encendía una linterna anaranjada y la ponía junto a su cama. Pero una noche, la linterna se apagó. La bombilla había muerto con un pequeño clic, y el mundo se volvió negro.</p><p>Rolo se quedó muy quieto, con la cola enrollada sobre el hocico. Escuchó. El bosque afuera hacía ruidos: cri-cri de grillos, fiu-fiu de algún pájaro nocturno, el susurro de las hojas. No parecían ruidos de peligro. Parecían... una conversación.</p><p>—¿Quién habla? —preguntó Rolo en voz muy bajita.</p><p>—Somos la noche —respondió una voz que parecía venir de todas partes y de ninguna—. No tengas miedo. Llevamos aquí mucho más tiempo que tú, y nunca le hemos hecho daño a ningún zorro pequeño que durmiera tranquilo.</p><p>Rolo lo pensó. Era cierto: había dormido muchas noches y siempre había amanecido.</p><p>—Está bien —dijo, y puso la cabeza en la almohada—. Pero si te portas mal, te enciendo la linterna.</p><p>La noche se rio muy suavecito, como cuando el viento mueve una cortina, y arrulló a Rolo hasta que sus patas dejaron de temblar y su respiración se hizo lenta y tranquila. Y nunca más necesitó la linterna.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐢", tag:"Aventura", title:"La Tortuga que Llevaba el Mar", desc:"Una tortuga marina guarda el secreto del sueño más profundo.", time:"~5 min", len:"medium",
    content:`<p>La tortuga Mara había cruzado todos los océanos del mundo. En su caparazón cada cuadro guardaba un recuerdo del mar. Aquí, la quietud de una laguna azul en calma. Allá, el vaivén suave de una ola de verano.</p><p>Decían las olas que Mara conocía el lugar donde el mar se hace silencio, un sitio tan tranquilo que quien lo escucha cae dormido plácidamente. Un día, un pulpo muy pequeño llamado Tito no podía dormir. Sus ocho brazos se enredaban y su mente daba vueltas.</p><p>—¿Dónde está ese lugar de silencio? —preguntó desesperado.</p><p>Mara lo miró con sus ojos dorados. —No está en ningún lugar del mapa —dijo—. Está justo debajo de tus propias olas. Cuando dejes de agitar los brazos y te dejes flotar, lo encontrarás.</p><p>Tito cerró sus ocho ojos, extendió sus brazos como algas que se mecen, y sintió cómo el agua lo sostenía. Poco a poco, todo fue haciéndose más suave, más quieto, más oscuro y tibio. Y se quedó dormido, meciéndose, mientras Mara vigilaba su sueño.</p><p>Esa noche, el océano entero respiró despacio.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌿", tag:"Naturaleza", title:"El Bosque que Cantaba de Noche", desc:"Un niño descubre que los árboles tienen su propio idioma al anochecer.", time:"~5 min", len:"medium",
    content:`<p>Cada noche, cuando el sol se escondía detrás de las colinas, los árboles del Bosque Verde empezaban a murmurar. Era un sonido muy suave, como páginas que alguien pasa despacio, o como agua que corre entre piedras redondas. Nadie sabía qué decían... excepto un niño llamado Nico.</p><p>Nico vivía en la casa de la linde del bosque. Desde su cama, con la ventana abierta, escuchaba el idioma de los árboles cada noche. Era una canción sin palabras, pero él la entendía perfectamente: Duerme. Descansa. Todo está bien.</p><p>Un verano, Nico enfermó y tuvo que quedarse en cama varios días. La ventana estaba cerrada y no podía escuchar el bosque. Las noches se le hacían largas.</p><p>Su abuela abrió la ventana apenas un centímetro. —Escucha —le dijo—. El bosque pregunta por ti.</p><p>Nico cerró los ojos y aguzó el oído. Allá, entre las ramas oscuras, llegó el murmullo. Esta vez le pareció oír su nombre: Nico, Nico, Nico... como una nana que los robles habían guardado solo para él.</p><p>Aquella noche durmió de un tirón. Desde entonces, siempre dejaba la ventana abierta una rendijita.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌈", tag:"Magia", title:"El Pintor de Sueños", desc:"Un duende con un pincel especial da color a los sueños grises.", time:"~6 min", len:"medium",
    content:`<p>Había una vez un duende llamado Pinto que tenía el trabajo más importante de todo el mundo dormido: pintar los sueños. Cada noche, cuando los niños cerraban los ojos, sus sueños llegaban a la fábrica de Pinto como lienzos en blanco.</p><p>Tenía pinceles de todos los tamaños. Uno muy fino para dibujar estrellas. Otro muy gordo para pintar mares enormes. Y uno especial, con cerdas de nubes, para hacer cielos suaves y esponjosos.</p><p>Una noche, una niña llamada Vera llegó con un sueño completamente gris. No tenía montañas ni mares ni animales. Solo una habitación gris con una silla gris, y en la silla, Vera sola.</p><p>Pinto entendió: era el sueño de alguien que se había sentido muy sola ese día. Con mucho cuidado, tomó su pincel más suave y añadió una ventana al cuadro. Luego pintó un jardín al otro lado. Luego unos pájaros. Luego una puerta abierta. Y finalmente, asomado por la puerta, pintó a un amigo que llegaba corriendo con los brazos abiertos.</p><p>En su cama, Vera sonrió mientras dormía. Y Pinto, satisfecho, pasó al siguiente lienzo en blanco.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🏰", tag:"Fantasía", title:"El Castillo de Nubes", desc:"Una princesa construye un castillo en el cielo para guardar todos los sueños.", time:"~5 min", len:"medium",
    content:`<p>Muy arriba, donde los aviones no llegan, hay un castillo hecho de nubes. No de nubes grises de tormenta, sino de las blancas y esponjosas del verano, que a veces parecen palomitas de maíz gigantes.</p><p>En ese castillo vive la princesa Celia. No lleva corona de oro sino de gotitas de lluvia que brillan como diamantes. Y su trabajo cada noche es abrir las ventanas del castillo para que entren todos los sueños del mundo.</p><p>Los sueños llegan volando como palomas: unos son dorados, otros son azules, algunos tienen formas de animales o de casas o de días que no han llegado todavía. Celia los mira uno a uno y los coloca en las habitaciones correctas, para que cada niño reciba el sueño que necesita esa noche.</p><p>¿Cómo sabe cuál corresponde a quién? Tiene un libro muy gordo con todos los nombres del mundo. Y debajo de tu nombre está escrito el sueño que esta noche te espera. Un sueño bueno, cálido y suave.</p><p>Ya lo está buscando. Ya lo está mandando. Cierra los ojos y espéralo.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐬", tag:"Aventura", title:"El Delfín que Bailaba con la Luna", desc:"Rizo el delfín tiene una rutina secreta cada noche antes de dormir.", time:"~5 min", len:"medium",
    content:`<p>Rizo era un delfín que no dormía como los demás. Mientras su familia descansaba en las aguas cálidas, él salía a la superficie y miraba la luna.</p><p>—¿Por qué siempre la miras? —le preguntó su hermana una noche.</p><p>—Porque bailamos —dijo Rizo.</p><p>Su hermana no lo entendió. Pero Rizo sonrió y saltó fuera del agua: primero una vez, luego dos, luego tres. Con cada salto dibujaba un arco plateado bajo la luna. Y la luna, que siempre estaba mirando, hacía un camino de luz en el agua justo para él.</p><p>Era su baile de buenas noches. Un baile para decirle al día que se había ido bien, que el mar estaba tranquilo, que todo estaba en su sitio.</p><p>Después del baile, Rizo volvía junto a su familia y cerraba los ojos. El agua lo mecía. La luna seguía brillando. Y Rizo dormía con el sabor de la sal y la luz en la memoria, que es la mejor almohada que existe.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🦁", tag:"Valentía", title:"El León que Tenía Miedo al Trueno", desc:"El rey de la sabana tiene un secreto que nadie conoce.", time:"~6 min", len:"medium",
    content:`<p>Todo el mundo sabía que Leo era el rey de la sabana. Tenía la melena más grande, el rugido más fuerte y los dientes más blancos. Todos le tenían un poco de respeto, incluso los elefantes.</p><p>Pero nadie sabía su secreto: Leo tenía miedo al trueno.</p><p>Cuando llegaba una tormenta, Leo se metía en su cueva y se hacía un ovillo con la cola tapándose los oídos. Le daba vergüenza porque era el rey. Los reyes no debían tener miedo.</p><p>Una noche, una cebra pequeña llamada Raya lo vio en la cueva. —¿Estás bien, Leo? —preguntó sin burlarse.</p><p>—Es que... el trueno suena muy fuerte —dijo Leo con voz pequeña.</p><p>Raya se sentó a su lado. —A mí también me asusta —confesó—. Pero cuando alguien está a tu lado, suena un poco menos fuerte. ¿Lo intentamos juntos?</p><p>Esperaron el siguiente trueno. Boom. Era fuerte. Pero con Raya a su lado, Leo respiró hondo y no le pareció tan terrible.</p><p>Desde entonces, en las noches de tormenta, Leo y Raya esperaban juntos en la cueva. Y los dos dormían mucho mejor.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🎠", tag:"Magia", title:"El Tiovivo Mágico", desc:"Un carrusel que aparece solo a medianoche lleva a los niños a lugares increíbles.", time:"~6 min", len:"medium",
    content:`<p>A la una de la madrugada, en el parque de la plaza, aparece un tiovivo que durante el día no existe. Sus caballos no son grises de madera: uno es verde como un campo, otro azul como el mar, otro dorado como el trigo en verano.</p><p>Solo pueden subirse los niños que están dormidos. Sus cuerpos se quedan en la cama, pero su sueño viene al parque y monta.</p><p>Clara subió al caballo verde. De repente estaba galopando por un prado lleno de flores que nunca había visto: algunas eran moradas, otras tenían forma de estrellas, y algunas olían a chocolate.</p><p>El tiovivo daba vueltas despacio, y con cada vuelta el paisaje cambiaba: bosque, playa, montaña nevada, ciudad flotante en las nubes.</p><p>Cuando el tiovivo paró, Clara no quería bajar. —¿Puedo quedarme? —preguntó.</p><p>—Mañana vuelves —dijo el caballo verde con voz suave—. El tiovivo estará aquí cada noche. Pero ahora es hora de descansar de verdad.</p><p>Clara se bajó, caminó hacia su cama y se fundió con ella como si nunca se hubiera ido.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🧚", tag:"Magia", title:"El Hada de los Sueños Rotos", desc:"Fina el hada recoge los sueños que se rompen antes de terminar y los repara.", time:"~5 min", len:"medium",
    content:`<p>A veces, a mitad de un sueño muy bueno, uno se despierta de golpe. La historia se corta y ya no se puede volver. ¿Qué pasa con esos sueños a medias?</p><p>Los recoge Fina, el hada de los sueños rotos. Tiene un bolso lleno de piezas de sueño: finales que nunca llegaron, personajes que se quedaron esperando, lugares que se cerraron antes de tiempo.</p><p>Fina los cose con aguja e hilo de luna. Los aplana, los repara, les pone un final bonito. Y cuando están listos los guarda en una caja de madera en su casa del árbol.</p><p>¿Para qué? Para devolverlos. Porque a veces, unas noches después, cuando uno duerme de nuevo muy tranquilo, Fina abre la caja y devuelve el sueño reparado. Y entonces, de repente, el sueño que se había cortado continúa desde donde lo dejó. Y tiene un final precioso.</p><p>Así que si esta noche vuelves a un sueño de otra noche, ya sabes quién lo había guardado para ti.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐦", tag:"Aventura", title:"El Pájaro que Cantaba al Revés", desc:"Pío descubre que su canto especial tiene un poder secreto al anochecer.", time:"~5 min", len:"medium",
    content:`<p>Todos los pájaros del bosque cantaban al amanecer para despertar el mundo. Pero Pío, un pájaro azul con la cola larga, cantaba al anochecer. Y su canción sonaba al revés: en lugar de subir, bajaba. En lugar de acelerar, se hacía más lenta. En lugar de animar, tranquilizaba.</p><p>Los otros pájaros se burlaban. —¡Tu canto va hacia atrás! —decían.</p><p>Pero los animales del bosque descubrieron algo: cuando Pío cantaba su canción lenta y bajita al caer la noche, todos se sentían con sueño. Las ardillas dejaban de correr. Los conejos bostezaban. Los ciervos cerraban los ojos.</p><p>Pío no cantaba para despertar el mundo. Cantaba para dormirlo. Y eso era igual de importante.</p><p>Desde entonces, cada noche, cuando el sol se ponía, todos los animales buscaban a Pío entre las ramas. Y cuando su canción bajita empezaba —chin, chin, chu... chin, chin, chu...— el bosque entero se rendía al sueño con una sonrisa.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌺", tag:"Naturaleza", title:"La Flor que Florecía de Noche", desc:"Lunaria es la única flor que abre sus pétalos cuando todo el mundo duerme.", time:"~5 min", len:"medium",
    content:`<p>En el jardín de la abuela había una planta muy rara. Durante el día sus pétalos estaban cerrados, apretados como un puño. Las otras flores la miraban con lástima. —Nunca verás el sol —le decían.</p><p>Pero cuando llegaba la noche y la luna salía, algo ocurría. Muy despacio, uno por uno, los pétalos de Lunaria se abrían. Eran blancos con un brillo suave, como si hubieran absorbido toda la luna de golpe.</p><p>Y olía. Madre mía, cómo olía. Un perfume que se mezclaba con el aire nocturno y llegaba por las ventanas abiertas.</p><p>La abuela de Martina lo sabía. Cada noche dejaba la ventana del cuarto de la niña entreabierta, y el perfume de Lunaria entraba despacito.</p><p>Martina nunca supo por qué sus noches olían tan bien y sus sueños eran tan bonitos. Pero Lunaria sí sabía. Florecía de noche precisamente para eso: para perfumar los sueños de quien no la veía florecer.</p><div class="story-end">✦ · ✦</div>`
  }
],

   7–10 AÑOS  (11 cuentos)

"7-10": [
  {
    emoji:"🐉", tag:"Fantasía", title:"El Dragón que Soñaba con Estrellas", desc:"Un pequeño dragón descubre que sus llamas plateadas pueden pintar el cielo.", time:"~7 min", len:"medium",
    content:`<p>En lo más alto de la montaña Neblina vivía un dragón llamado Lumito. Era pequeño para ser un dragón, y sus escamas brillaban como carbones apagados. Pero Lumito tenía un secreto: cuando soplaba su aliento, en lugar de llamas naranja, le salían pequeñas chispas plateadas.</p><p>Los otros dragones se reían de él. —¿Qué clase de dragón escupe plata? Los dragones de verdad escupen fuego.</p><p>Lumito se alejaba sin responder. Sabía algo que ellos no: cada chispa que soplaba hacia el cielo se convertía en una estrella. Lo había descubierto por accidente, una noche de tormenta en que estornudó hacia arriba y al día siguiente la gente del valle comentaba que había aparecido una estrella nueva.</p><p>Desde entonces, todas las noches, cuando los otros dragones dormían, Lumito trepaba a la punta más alta de la roca y soplaba hacia el cielo. Las chispas volaban hacia arriba, arriba, arriba... y se quedaban fijas, titilando. Era su regalo silencioso al mundo.</p><p>Una noche, una niña pastora llamada Sofía lo vio desde el valle. No tuvo miedo. Subió por el camino de piedra y se sentó a su lado, sin decir nada.</p><p>—¿Por qué lo haces? —preguntó Sofía al fin.</p><p>—Para que nadie duerma en la oscuridad completa —respondió Lumito con voz suave como el humo de una vela.</p><p>Sofía sonrió. Lumito sopló una chispa especialmente grande que cruzó todo el cielo y se convirtió en la estrella más brillante de la noche. Y desde entonces, cada vez que veas una estrella especialmente brillante, ya sabes quién la puso allí.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"⭐", tag:"Misterio", title:"La Niña que Coleccionaba Estrellas Caídas", desc:"Elena descubre que las estrellas en un frasco pueden vencer al miedo.", time:"~8 min", len:"long",
    content:`<p>Elena tenía un frasco de cristal azul sobre su mesita de noche. No guardaba caramelos ni monedas como creían sus hermanos. Guardaba estrellas fugaces. Pequeñísimas, del tamaño de un grano de arroz, pero que brillaban con luz propia toda la noche.</p><p>Las coleccionaba así: cuando veía una estrella caer, cerraba los ojos muy fuerte, hacía el deseo y abría la palma hacia el cielo. Si el deseo era genuino, la estrella dejaba un pedacito de sí misma en su mano.</p><p>Su primer deseo había sido que su perro Canelo se curara de la pata rota. El segundo, que sus padres dejaran de discutir tanto. El tercero, más pequeño pero igual de sincero, que el helado de fresa de los domingos nunca se acabara.</p><p>El frasco tenía nueve estrellas cuando llegó la noche de la tormenta grande. Los truenos retumbaban como si alguien moviera todos los muebles del cielo.</p><p>Elena se tapó la cabeza con la almohada. Entonces recordó el frasco. Con cuidado, lo agarró con las dos manos. Las nueve estrellas titilaron dentro del cristal azul y una luz suave y dorada llenó su cuarto. La tormenta seguía afuera, pero dentro todo era cálido y quieto.</p><p>Elena se recostó mirando las estrellas girar despacio. Nueve destellos, nueve deseos, nueve pequeñas promesas de que el mundo tenía más magia que miedo. Y con ese pensamiento suave como plumas, se fue quedando dormida.</p><p>A la mañana siguiente, el frasco tenía diez estrellas. Allí estaba la décima: más pequeña que las demás, casi transparente, pulsando con una luz color lavanda. Nunca supo cómo llegó. Pero sospechaba que era un regalo de la propia tormenta.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🚂", tag:"Aventura", title:"El Tren que Solo Viaja de Noche", desc:"Un tren misterioso recoge a quienes no pueden dormir y los lleva lejos.", time:"~9 min", len:"long",
    content:`<p>A las doce en punto de cada noche, si te quedas muy quieto y escuchas con atención, quizás oigas un sonido lejano: chu-chu-chu. No es cualquier tren. Es el Noctámbulo, y su vía no aparece en ningún mapa.</p><p>Marco lo oyó por primera vez un martes. Llevaba tres noches sin dormir porque al día siguiente tenía que hacer una presentación delante de toda la clase y el miedo le tapaba el pecho como una piedra. Se asomó a la ventana y ahí estaba: un tren oscuro con ventanas doradas, deteniéndose silenciosamente frente a su calle.</p><p>En la puerta había un revisor con sombrero de terciopelo azul y una linterna que proyectaba constelaciones en el suelo. —¿Destino? —preguntó. —No sé —contestó Marco. —Perfecto. Ese es el mejor destino —dijo el revisor.</p><p>El tren por dentro era más grande de lo que parecía. Había vagones con hamacas, vagones con telescopios, vagones llenos de libros con los lomos de colores imposibles.</p><p>Marco encontró un vagón con ventanas enormes. El paisaje que pasaba afuera eran montañas de nieve azul, ríos de luz líquida, pueblos diminutos donde cada ventana encendida era una historia diferente.</p><p>—¿A dónde vamos de verdad? —le preguntó a una niña del asiento de al lado.</p><p>—A donde necesitas —dijo ella—. Yo fui al bosque del olvido. Olvidé todo lo que me preocupaba. Volví nueva.</p><p>—Yo necesito valor —dijo Marco—. Mañana tengo que hablar delante de mucha gente.</p><p>—Entonces irás a las montañas del eco. Allí tu propia voz vuelve a ti más fuerte de lo que la mandaste.</p><p>Marco no recordó el resto del viaje porque se quedó dormido en el asiento de terciopelo. Cuando despertó era de mañana y estaba en su cama. Pero en la mano tenía algo: un pequeño billete de tren color azul oscuro, con una sola palabra impresa: Puedes.</p><p>Aquel día hizo la presentación. Le temblaron las manos, pero su voz viajó lejos.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🗺️", tag:"Aventura", title:"El Mapa que Cambiaba Solo", desc:"Tomás encuentra un mapa antiguo cuyas rutas se dibujan solas cada noche.", time:"~8 min", len:"long",
    content:`<p>El mapa estaba enrollado dentro de un tubo de latón que Tomás encontró en el desván de su abuelo. Era viejo, con los bordes quemados y manchas de agua en las esquinas. Los ríos eran azules, las montañas tenían sombra dibujada a mano y los pueblos llevaban nombres que ningún mapa moderno conocía.</p><p>Lo colgó en la pared de su cuarto. Y la primera noche, mientras Tomás dormía, ocurrió algo: cuando se despertó a beber agua a las tres de la madrugada y miró el mapa de reojo, había un camino nuevo. Una línea roja que no estaba antes, serpenteando desde un punto marcado con una pequeña luna hasta otro marcado con un sol.</p><p>La siguiente noche el camino había avanzado. La siguiente, llegaba a una ciudad dibujada con más detalle que el resto, con cúpulas y torres y un río que rodeaba las murallas. Tomás empezó a esperar la oscuridad para ver qué habría cambiado.</p><p>Una noche, junto al mapa, apareció una nota en el mismo papel antiguo: El camino no muestra dónde ir. Muestra adónde ya estás yendo.</p><p>Tomás tardó en entenderlo. Pero esa semana había empezado a aprender astronomía por su cuenta, a levantarse temprano para mirar el amanecer y a escribir en un cuaderno cosas que antes se le olvidaban. El mapa no le indicaba el camino. Le estaba contando el suyo.</p><p>Desde entonces, cada noche miraba el mapa antes de dormir. Y dormía con la sensación agradable de que iba en la dirección correcta, aunque todavía no supiera exactamente adónde.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌋", tag:"Misterio", title:"La Isla del Volcán Dormido", desc:"Una expedición de tres amigos descubre que el volcán solo duerme cuando ellos también duermen.", time:"~8 min", len:"long",
    content:`<p>La isla Brasa llevaba cien años sin erupcionar. Los científicos decían que el volcán estaba dormido. Pero los tres amigos que vivían en el pueblo de la costa tenían su propia teoría: el volcán dormía porque alguien lo cuidaba.</p><p>Esa alguien era una anciana llamada Petra que vivía en la falda de la montaña y que, según los vecinos más mayores, nunca dormía. Siempre estaba despierta, siempre con los ojos abiertos mirando el cráter.</p><p>Una tarde de verano, los tres amigos —Ira, Calo y Mín— subieron hasta su casa.</p><p>—¿Es verdad que usted no duerme nunca? —preguntó Ira.</p><p>Petra sonrió. —Duermo cuando el volcán duerme —dijo—. Y el volcán duerme cuando los niños del pueblo duermen tranquilos. Hay algo en el sueño de los niños que calma la tierra. No lo sé explicar. Solo sé que funciona.</p><p>Los tres amigos se miraron. Bajaron corriendo al pueblo. Esa noche, los tres se acostaron a su hora sin protestar, se taparon hasta la barbilla y cerraron los ojos con determinación. Durmieron profundamente.</p><p>Y el volcán no emitió ni una voluta de humo.</p><p>Desde entonces, cuando alguno de los tres tenía ganas de quedarse despierto hasta tarde, recordaba a Petra en su casa de la falda y pensaba: esta noche, yo también cuido la isla. Y se quedaba dormido sintiéndose importante.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🔮", tag:"Fantasía", title:"La Bola de Cristal que No Mentía", desc:"Una bola mágica solo muestra el futuro cuando el que la mira tiene el corazón tranquilo.", time:"~7 min", len:"medium",
    content:`<p>En el mercadillo del último sábado del mes había un puesto que no siempre estaba. Cuando aparecía, lo regentaba una señora con un sombrero de paja y una bola de cristal sobre un cojín de terciopelo rojo.</p><p>—¿Muestra el futuro? —preguntó Lucas la primera vez que la vio.</p><p>—Solo a veces —dijo la señora—. La bola tiene una regla: solo funciona si el corazón del que la mira está tranquilo. Si estás nervioso, enfadado o asustado, la bola queda completamente oscura.</p><p>Lucas trató de mirarla. Estaba nervioso porque al día siguiente tenía un examen. La bola quedó oscura como una piedra.</p><p>—Vuelve cuando hayas dormido bien —dijo la señora.</p><p>Lucas volvió a casa. Esa noche, en lugar de repasar el examen por enésima vez, dejó el libro, respiró hondo y se dijo: ya sé lo que sé. Durmió de un tirón.</p><p>Al día siguiente, después del examen, volvió al mercadillo. Se paró ante la bola. Respiró despacio. Pensó en nada. Y la bola se iluminó desde dentro con una luz dorada y mostró una imagen: Lucas en el futuro, con libros alrededor, sonriendo. No mostraba exámenes ni notas. Solo eso: Lucas feliz con libros.</p><p>—¿Eso es el futuro? —preguntó.</p><p>—Eso es lo que ya eres —dijo la señora.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🐺", tag:"Naturaleza", title:"El Lobo que Guardaba el Invierno", desc:"Un lobo solitario cuida de que el invierno llegue a tiempo cada año.", time:"~7 min", len:"medium",
    content:`<p>Antes del invierno, siempre aparecía un lobo gris en el borde del bosque. Los aldeanos lo conocían desde generaciones. No era el mismo lobo, claro: los lobos no viven tanto. Pero siempre era uno, siempre gris, siempre en el mismo sitio, mirando al norte.</p><p>La abuela de Vera decía que ese lobo era el guardián del invierno. Su trabajo era ir a buscar el frío al norte y traerlo de vuelta antes de que la tierra se secara demasiado.</p><p>—¿Y si no viniera? —preguntó Vera una vez.</p><p>—Entonces no nevaría. Los ríos bajarían. Los árboles no descansarían. Todo necesita su invierno, Vera. También las personas.</p><p>Vera pensó en eso durante mucho tiempo. El invierno era cuando se quedaba más en casa, cuando leía más, cuando dormía más horas y tenía los sueños más largos. Quizás su cuerpo también necesitaba ese frío para descansar de verdad.</p><p>Esa noche nevó por primera vez. Vera vio los copos caer desde la ventana, pensó en el lobo gris viajando desde el norte con el frío a sus espaldas, y se metió en la cama sintiéndose parte de algo muy grande y muy antiguo. Y durmió el sueño más largo del año.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🎭", tag:"Misterio", title:"El Teatro de los Sueños Perdidos", desc:"Un teatro abandonado cobra vida cada noche para representar los sueños que nadie recuerda.", time:"~9 min", len:"long",
    content:`<p>El teatro Mirall llevaba veinte años cerrado. Las letras del cartel habían perdido la pintura y las ventanas estaban tapadas con tablas. Pero los vecinos más observadores juraban que de noche, si pasabas por la calle y escuchabas con mucho cuidado, oías música y aplausos desde dentro.</p><p>Ana y su primo Óscar lo oyeron una noche de otoño. Se miraron. Empujaron la puerta lateral, que cedió sin esfuerzo, como si los estuviera esperando.</p><p>Por dentro, el teatro estaba perfectamente iluminado. Las butacas eran de terciopelo rojo sin una mota de polvo. El escenario tenía el telón abierto y en él... había una obra en marcha. Actores que no eran del todo reales, más bien figuras de luz, representaban escenas que Ana reconoció de inmediato.</p><p>—Ese sueño era mío —susurró—. Lo soñé hace semanas y lo olvidé al despertar.</p><p>En el escenario, su yo de sueño corría por un campo de amapolas y encontraba una puerta en mitad de ninguna parte. La misma puerta que Ana recordaba vagamente al despertar pero que nunca había podido abrir.</p><p>Ahora la veía abrirse. Al otro lado había algo que no podía describir con palabras: solo una sensación de espacio y luz y posibilidad.</p><p>Cuando el telón cayó, Ana y Óscar salieron en silencio a la calle. La noche olía a tierra mojada.</p><p>—¿Crees que podemos volver? —preguntó Óscar.</p><p>—Creo que no hay que volver —dijo Ana—. Los sueños están ahí para verlos esa noche. Si los olvidas al despertar, el teatro los guarda por ti. Y si algún día los necesitas, los representa.</p><p>Esa noche durmió de un tirón y soñó cosas que recordaría toda la semana.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌠", tag:"Ciencia", title:"El Astrónomo de Doce Años", desc:"Pablo descubre una estrella nueva y aprende que algunos descubrimientos solo ocurren de noche.", time:"~8 min", len:"long",
    content:`<p>Pablo tenía un telescopio pequeño que le había regalado su padre. No era de los grandes de los observatorios, pero con él podía ver los cráteres de la luna, los anillos de Saturno y, si la noche era muy clara, algunas nebulosas lejanas como manchas de algodón en el cielo.</p><p>Cada viernes se quedaba hasta la una de la madrugada mirando al cielo desde la terraza con una manta sobre los hombros y un termo de cacao. Su madre protestaba al principio, pero luego entendió que Pablo hacía sus mejores preguntas los sábados por la mañana, después de sus noches de telescopio.</p><p>Una noche de noviembre, Pablo vio algo que no cuadraba. En un sector del cielo donde había catalogado cuatro estrellas, ahora había cinco. Una pequeña, tenue, que parpadeaba de una manera ligeramente diferente a las demás.</p><p>Pasó tres viernes seguidos verificándolo. Dibujó mapas. Tomó fotos con su teléfono a través del ocular. Lo comparó con los catálogos online.</p><p>La estrella no aparecía en ningún catálogo.</p><p>Con manos temblorosas, Pablo envió un correo al observatorio de la ciudad con sus datos y sus fotos. Tardaron dos semanas en responder. Cuando lo hicieron, decía: Hola Pablo. Hemos verificado tus coordenadas. Tienes razón. Felicidades, acabas de catalogar un objeto celeste no registrado. Necesitamos hablar contigo.</p><p>Pablo lo leyó tres veces. Luego fue a la terraza, miró al cielo y buscó su estrella. Allí estaba, parpadeando tenuemente, esperándolo como cada noche. Solo que ahora tenía nombre: la llamarían Pablo 1.</p><p>No todos los descubrimientos importantes ocurren durante el día.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🏔️", tag:"Naturaleza", title:"La Montaña que Respiraba", desc:"Una niña aprende a respirar despacio observando cómo lo hace la montaña de su pueblo.", time:"~7 min", len:"medium",
    content:`<p>La montaña del pueblo de Lena se llamaba Calma. No era especialmente alta ni especialmente famosa. Pero tenía algo que ninguna otra montaña del mundo tenía: cuando soplaba el viento de norte, si escuchabas muy, muy atento, parecía que respiraba.</p><p>In... fuuuu... In... fuuuu...</p><p>Como una respiración larguísima, profunda, que tardaba varios minutos en completarse.</p><p>Lena lo oyó por primera vez a los nueve años, un atardecer en que estaba enfadada por algo que ya no recordaba. Se sentó en una piedra mirando a la montaña y de repente lo escuchó. In... fuuuu...<p></p>Sin pensarlo, su pecho comenzó a copiar ese ritmo. Respiró igual de despacio. Y el enfado, que un momento antes le llenaba la garganta, fue haciéndose más pequeño con cada espiración larga.</p><p>—La montaña respira así desde hace millones de años —le dijo su abuela esa noche—. Por eso se llama Calma. La gente del pueblo aprendió a respirar mirándola.</p><p>Desde entonces, cuando Lena no podía dormir, no contaba ovejas. Cerraba los ojos, imaginaba la montaña oscura bajo las estrellas y copiaba su respiración. In... fuuuu... In... fuuuu...</p><p>Y en menos de diez respiraciones, se quedaba dormida.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🦅", tag:"Aventura", title:"El Mensajero del Amanecer", desc:"Un águila lleva mensajes de los sueños al mundo real, pero solo puede volar de noche.", time:"~7 min", len:"medium",
    content:`<p>El águila Vela llevaba mensajes. No era la clase de mensajes que uno lleva en una carta atada a la pata: eran mensajes de sueño, cosas que la mente elabora de noche y que a veces, solo a veces, consiguen cruzar hasta el mundo real.</p><p>Vela volaba desde el anochecer hasta el amanecer. Recogía los sueños que tenían algo importante que decir, los atrapaba con sus garras suaves y los transportaba hacia quienes los necesitaban.</p><p>Una noche llevó el sueño de una niña a su madre: en él, la niña perdonaba a su madre por algo que había pasado la semana anterior. La madre se despertó llorando de alivio.</p><p>Otra noche llevó el sueño de un abuelo a su nieto: en él, el abuelo le enseñaba a hacer un nudo marinero que el nieto recordó perfectamente al despertar, aunque el abuelo llevaba años sin poder salir de casa.</p><p>Vela nunca llegaba al amanecer. Antes de que el sol asomara, ya estaba de vuelta en su nido, con las alas dobladas y los ojos cerrados, descansando para la noche siguiente.</p><p>Por eso, si esta noche tienes un sueño que quieres que alguien reciba, piensa en esa persona antes de cerrar los ojos. Vela estará por aquí. Y si el sueño vale la pena, lo llevará.</p><div class="story-end">✦ · ✦</div>`
  }
],

  {
    emoji:"🌊", tag:"Reflexión", title:"El Faro del Fin del Mapa", desc:"Una adolescente descubre un faro que solo aparece cuando alguien lo necesita.", time:"~12 min", len:"long",
    content:`<p>Nadie en el pueblo hablaba del Faro del Confín. Aparecía en algunas fotos antiguas del puerto, pero si preguntabas a los adultos, fruncían el ceño y decían que era un error del revelado. Nora, sin embargo, lo había visto con sus propios ojos: una noche de diciembre, desde el acantilado, una luz lenta y acompasada parpadeando más allá donde terminaban las cartas de navegación.</p><p>Tenía catorce años y un cuaderno lleno de preguntas sin respuesta. ¿Por qué se había marchado su padre sin dejar dirección? ¿Por qué su mejor amiga Ana dejó de hablarle? ¿Por qué a veces sentía que el mundo avanzaba y ella estaba parada en el centro viendo pasar las cosas?</p><h3>La noche que llegó al faro</h3><p>Fue en enero cuando encontró el camino. Una senda entre las rocas que juraba no haber visto nunca. Llegó a una plataforma de piedra donde el faro giraba en silencio. La puerta estaba abierta. Adentro, una escalera de caracol subía entre estantes llenos de objetos: botellas con mensajes, brújulas rotas, relojes parados a distintas horas.</p><p>En la cima había un cuarto redondo. Una silla, una mesa, y sobre ella un libro abierto. Las páginas estaban en blanco... excepto la primera: Aquí viene el que no puede dormir porque carga algo demasiado pesado para una sola persona. Escribe lo que pesas. El mar sabe escuchar.</p><p>Nora sacó el bolígrafo y escribió. Escribió sobre su padre. Sobre Ana. Sobre la sensación de estar parada mientras el mundo gira. Escribió durante una hora, con el faro girando sobre ella y el mar rugiendo suave catorce pisos más abajo.</p><h3>Lo que encontró al terminar</h3><p>Cuando levantó los ojos, había amanecido. Y en la página siguiente aparecieron unas líneas: Las cosas que pesan no desaparecen cuando se nombran. Pero cambian de forma. Lo que era una piedra se vuelve agua. Lo que era muro se vuelve puente. No estás parada, Nora. Estás echando raíces.</p><p>Nora cerró el libro. No supo quién había escrito eso ni cómo sabían su nombre. Bajó las escaleras despacio y esa tarde le escribió a Ana. No para pedir explicaciones: solo para decirle que la echaba de menos. Ana respondió a los cinco minutos.</p><p>El faro no volvió a aparecer en el acantilado. Pero a veces, cuando la noche se ponía muy larga, Nora sentía su luz girar despacio dentro del pecho. Y era suficiente para quedarse dormida.</p><div class="story-end">✦ · ✦</div>`

  {
    emoji:"🗝️", tag:"Misterio", title:"Las Cartas del Abuelo Invisible", desc:"Cada mañana aparece una carta del abuelo que murió hace un año. Nadie sabe cómo.", time:"~13 min", len:"long",
    content:`<p>La primera carta apareció en el escritorio de Diego el lunes 3 de marzo, exactamente un año después de que el abuelo Ernesto muriera. Estaba en un sobre color crema, escrita a mano con la letra redonda e inclinada que Diego habría reconocido en cualquier parte. Decía: Diego, sé que esta noche no puedes dormir porque hoy es el aniversario. Está bien no estar bien. Eso también es querer a alguien. Con cariño, el abuelo.</p><p>Diego pensó que era una broma de su madre. Pero la segunda carta apareció el miércoles, cuando Diego perdió el partido de fútbol más importante del año. Y la tercera el viernes, cuando discutió con su mejor amigo. Ninguna carta mencionaba cosas imposibles. Solo hablaban de Diego. De lo que estaba viviendo ese día concreto.</p><h3>La investigación</h3><p>Diego instaló su teléfono apuntando al escritorio y grabó toda una noche. A las 3:47 de la madrugada, la pantalla se llenó de estática blanca durante doce segundos. Cuando volvió la imagen, el sobre estaba allí. No había entrado nadie.</p><p>Le mostró el vídeo a su madre. Ella fue a su dormitorio y volvió con una caja de zapatos llena de cartas. Con la misma letra. Me llegan desde que murió, dijo. No sé cómo. Algunas mencionan cosas que pasaron después de que él murió. Cosas que él no podía saber.</p><p>Se sentaron en la cama y las leyeron juntos. Una carta hablaba del día en que Diego reprobó matemáticas. Otra, del día en que su madre llegó llorando del trabajo. Otra más decía solo: El helecho que comprasteis el martes necesita menos agua. Os lo digo con cariño.</p><p>Diego y su madre se miraron. Se rieron. Era la primera vez que se reían juntos desde hacía meses.</p><h3>La última carta</h3><p>La décima carta decía: Esta es la última que os escribo, no porque me haya ido más lejos, sino porque ya no la necesitáis. He visto cómo os miráis. He visto que habláis de nuevo. Mi trabajo aquí está hecho. Diego: hubo un Diego de trece años, igual que tú, que también perdió a alguien y también pensó que el mundo se había vuelto demasiado silencioso. Ese Diego encontró la manera de seguir. Tú también la encontrarás. Duerme, que mañana hay partido. Y no discutas con el árbitro aunque tenga razón.</p><p>Diego dobló la carta con cuidado. Apagó la luz. Y durmió de una manera que no recordaba desde hacía un año: sin ese peso en el centro del pecho. Solo el ruido normal de la noche, que es el ruido de alguien que te cuida desde lejos.</p><div class="story-end">✦ · ✦</div>`
