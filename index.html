<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060916" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Sueños de Luna — Cuentos de Buenas Noches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-deep:     #060916;
      --bg-card:     rgba(14,20,55,0.82);
      --gold:        #f0c060;
      --gold-dim:    rgba(240,192,96,0.15);
      --gold-border: rgba(240,192,96,0.28);
      --soft:        #9bb8ff;
      --moon:        #e8dcc8;
      --text:        #dde4f4;
      --muted:       #7a8fbb;
      --radius:      20px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-h:       72px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      padding-top: var(--safe-top);
    }

    /* ── CANVAS & NEBULAE ── */
    #stars-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .nebula { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.28; pointer-events: none; z-index: 0; }
    .n1 { width: 500px; height: 500px; background: #1a2a8a; top: -120px; right: -100px; animation: drift 20s ease-in-out infinite alternate; }
    .n2 { width: 360px; height: 360px; background: #3a1060; bottom: 15%; left: -80px; animation: drift 25s ease-in-out infinite alternate-reverse; }
    .n3 { width: 280px; height: 280px; background: #0a3060; bottom: -60px; right: 5%; animation: drift 17s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(22px,35px) scale(1.1); } }

    /* ── LAYOUT ── */
    .app {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto;
      padding: 0 16px;
      padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 20px);
    }

    /* ── HEADER ── */
    header { text-align: center; padding: 44px 0 28px; }
    .moon-icon {
      font-size: 50px; display: block; margin-bottom: 14px;
      animation: moonFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(240,192,96,0.65));
    }
    @keyframes moonFloat { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-10px) rotate(5deg);} }
    header h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(1.9rem,8vw,2.7rem); font-weight:300; color:var(--moon); letter-spacing:0.01em; line-height:1.1; }
    header h1 em { font-style:italic; color:var(--gold); }
    header p { margin-top:8px; font-size:0.78rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

    /* ── AGE BADGE ── */
    .current-age-badge { display:flex; align-items:center; justify-content:center; gap:10px; margin:0 0 24px; }
    .age-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(155,184,255,0.2),transparent); }
    .age-label { font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:100px; padding:4px 14px; white-space:nowrap; }

    /* ── STORY CARDS ── */
    .stories-grid { display:flex; flex-direction:column; gap:14px; }
    .story-card {
      background:var(--bg-card); border:1px solid rgba(155,184,255,0.1);
      border-radius:var(--radius); padding:18px 18px 14px;
      cursor:pointer; backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      transition:transform .18s,box-shadow .18s,border-color .18s,opacity .35s;
      position:relative; overflow:hidden;
      -webkit-tap-highlight-color:transparent; min-height:48px;
      opacity:0; transform:translateY(22px);
    }
    .story-card.visible { opacity:1; transform:translateY(0); }
    .story-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(80,130,255,0.1),transparent 55%); opacity:0; transition:opacity .3s; }
    .story-card:active { transform:scale(0.975); }
    .story-card:hover { border-color:rgba(155,184,255,0.28); box-shadow:0 8px 36px rgba(80,130,255,0.1); }
    .story-card:hover::before { opacity:1; }
    .story-card:hover .card-arrow { transform:translateX(4px); opacity:1; }

    .ribbon { position:absolute; top:14px; right:-2px; font-size:0.58rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:3px 12px 3px 8px; border-radius:4px 0 0 4px; color:#060916; }
    .ribbon.short { background:#88d4ab; } .ribbon.medium { background:var(--gold); } .ribbon.long { background:#c09aff; }

    .card-top { display:flex; align-items:flex-start; gap:12px; }
    .card-emoji { font-size:2rem; line-height:1; flex-shrink:0; filter:drop-shadow(0 2px 8px rgba(240,192,96,.3)); margin-top:2px; }
    .card-meta { flex:1; min-width:0; padding-right:32px; }
    .card-tag { display:inline-block; font-size:0.62rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:100px; padding:2px 9px; margin-bottom:5px; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; color:var(--moon); line-height:1.2; }
    .card-desc { margin-top:5px; font-size:0.78rem; color:var(--muted); line-height:1.5; }
    .card-arrow { font-size:1.1rem; color:var(--soft); opacity:.5; transition:transform .2s,opacity .2s; flex-shrink:0; margin-top:2px; }
    .card-footer { display:flex; align-items:center; gap:6px; margin-top:12px; padding-top:10px; border-top:1px solid rgba(155,184,255,0.08); }
    .card-time { font-size:0.7rem; color:var(--muted); display:flex; align-items:center; gap:4px; }
    .card-dot { width:3px; height:3px; border-radius:50%; background:var(--muted); opacity:.35; margin:0 3px; }
    .card-age { font-size:0.7rem; color:var(--muted); }

    /* ── BOTTOM TAB BAR ── */
    .tab-bar {
      position:fixed; bottom:0; left:0; right:0; z-index:50;
      background:rgba(8,13,38,0.94); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border-top:1px solid rgba(155,184,255,0.12);
      display:flex; align-items:stretch;
      padding-bottom:var(--safe-bottom);
      height:calc(var(--tab-h) + var(--safe-bottom));
    }
    .tab-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; background:none; border:none; cursor:pointer; color:var(--muted);
      -webkit-tap-highlight-color:transparent; transition:color .2s;
      padding:10px 4px; min-height:48px; position:relative;
    }
    .tab-btn::after { content:''; position:absolute; bottom:0; left:20%; right:20%; height:2px; background:var(--gold); border-radius:2px 2px 0 0; opacity:0; transform:scaleX(0); transition:opacity .25s,transform .25s; }
    .tab-btn.active { color:var(--gold); }
    .tab-btn.active::after { opacity:1; transform:scaleX(1); }
    .tab-icon { font-size:1.35rem; line-height:1; }
    .tab-label { font-size:0.6rem; font-weight:500; letter-spacing:0.04em; }

    /* ── MODAL ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(3,6,18,0.9); z-index:100;
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity .3s ease;
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-sheet {
      width:100%; max-width:480px; margin:0 auto;
      background:linear-gradient(160deg,#0d1535 0%,#080d22 100%);
      border-top:1px solid rgba(155,184,255,0.15);
      border-radius:28px 28px 0 0;
      max-height:94dvh; overflow-y:auto;
      padding:14px 24px calc(28px + var(--safe-bottom));
      transform:translateY(50px);
      transition:transform .38s cubic-bezier(.34,1.36,.64,1);
    }
    .modal-overlay.open .modal-sheet { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; background:rgba(155,184,255,.2); border-radius:100px; margin:0 auto 18px; }
    .modal-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
    .modal-emoji { font-size:2.6rem; filter:drop-shadow(0 4px 14px rgba(240,192,96,.4)); }
    .modal-close { width:36px; height:36px; border-radius:50%; border:1px solid rgba(155,184,255,.2); background:rgba(155,184,255,.06); color:var(--muted); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transition:background .2s; }
    .modal-close:hover { background:rgba(155,184,255,.15); }
    .modal-tag { display:inline-block; font-size:0.62rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:100px; padding:2px 10px; margin-bottom:8px; }
    .modal-title { font-family:'Cormorant Garamond',serif; font-size:clamp(1.6rem,6vw,2.1rem); font-weight:400; color:var(--moon); line-height:1.15; margin-bottom:5px; }
    .modal-meta { display:flex; align-items:center; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
    .modal-meta span { font-size:0.72rem; color:var(--muted); }
    .modal-meta .dot { width:3px; height:3px; border-radius:50%; background:var(--muted); opacity:.4; }
    .modal-divider { height:1px; background:linear-gradient(90deg,rgba(155,184,255,.2),transparent); margin-bottom:22px; }

    /* ══════════════════════════════════
       AUDIO PLAYER
    ══════════════════════════════════ */
    .audio-player {
      background: rgba(10,16,45,0.8);
      border: 1px solid rgba(155,184,255,0.15);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .audio-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    /* Main play/pause button */
    .audio-playbtn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #f0c060, #d4960a);
      color: #060916;
      font-size: 1.35rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(240,192,96,0.4);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .audio-playbtn:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(240,192,96,0.3); }
    .audio-playbtn.playing { background: linear-gradient(135deg,#9bb8ff,#5580e0); box-shadow:0 4px 20px rgba(155,184,255,0.4); }

    /* Soundwave animation (visible when playing) */
    .soundwave {
      display: flex; align-items: center; gap: 3px;
      height: 20px;
    }
    .soundwave span {
      display: block; width: 3px;
      background: var(--gold);
      border-radius: 3px;
      animation: wave 1.2s ease-in-out infinite;
      transform-origin: bottom;
    }
    .soundwave span:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .soundwave span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
    .soundwave span:nth-child(3) { height: 20px; animation-delay: 0.3s; }
    .soundwave span:nth-child(4) { height: 10px; animation-delay: 0.45s; }
    .soundwave span:nth-child(5) { height: 16px; animation-delay: 0.6s; }
    .soundwave.paused span { animation-play-state: paused; }
    @keyframes wave {
      0%,100% { transform: scaleY(0.4); opacity:.5; }
      50%      { transform: scaleY(1);   opacity:1; }
    }

    .audio-info { flex: 1; min-width: 0; }
    .audio-status {
      font-size: 0.72rem; font-weight: 500;
      color: var(--gold); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 3px;
    }
    .audio-voice {
      font-size: 0.75rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Stop button */
    .audio-stopbtn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(155,184,255,0.2);
      background: rgba(155,184,255,0.06);
      color: var(--muted); font-size: 0.9rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: background .2s, color .2s;
      flex-shrink: 0;
    }
    .audio-stopbtn:hover { background: rgba(155,184,255,0.15); color: var(--text); }

    /* Progress bar */
    .audio-progress {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .progress-bar-wrap {
      flex: 1; height: 4px;
      background: rgba(155,184,255,0.15);
      border-radius: 4px; overflow: hidden;
      cursor: pointer;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #c09aff);
      border-radius: 4px;
      width: 0%;
      transition: width 0.5s linear;
    }
    .progress-time { font-size: 0.65rem; color: var(--muted); white-space: nowrap; min-width: 28px; }

    /* Speed & voice controls */
    .audio-controls {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .ctrl-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .ctrl-btn {
      font-size: 0.68rem; font-weight: 500;
      padding: 4px 10px; border-radius: 100px;
      border: 1px solid rgba(155,184,255,0.18);
      background: rgba(155,184,255,0.06);
      color: var(--muted); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .2s, color .2s, background .2s;
    }
    .ctrl-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    .ctrl-sep { width: 1px; height: 16px; background: rgba(155,184,255,0.12); margin: 0 2px; }

    /* Voice selector */
    .voice-select {
      flex: 1; min-width: 0;
      background: rgba(155,184,255,0.06);
      border: 1px solid rgba(155,184,255,0.18);
      border-radius: 100px;
      color: var(--muted); font-size: 0.68rem;
      padding: 4px 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      font-family: 'DM Sans', sans-serif;
    }
    .voice-select option { background: #0d1535; color: var(--text); }

    /* No-TTS warning */
    .audio-unsupported {
      font-size: 0.75rem; color: var(--muted); text-align: center;
      padding: 12px 0 4px;
      line-height: 1.5;
    }

    /* ── STORY BODY ── */
    .modal-body { font-family:'Cormorant Garamond',serif; font-size:clamp(1.05rem,4vw,1.17rem); font-weight:300; line-height:1.88; color:#ccd8f0; }
    .modal-body p { margin-bottom:1.15em; }
    .modal-body h3 { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; color:var(--gold); margin:1.8em 0 0.6em; letter-spacing:0.04em; }
    .modal-body p:first-of-type::first-letter { font-size:3.4em; float:left; line-height:.75; margin:4px 10px 0 0; color:var(--gold); font-weight:600; }
    .story-end { text-align:center; color:var(--gold); font-size:1.4rem; margin-top:1em; }

    /* Highlighted word during reading */
    .tts-highlight { background: rgba(240,192,96,0.25); border-radius: 3px; padding: 0 2px; transition: background .1s; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align:center; padding:60px 20px; }
    .empty-state .es-icon { font-size:3rem; margin-bottom:16px; opacity:.5; }
    .empty-state p { font-size:0.85rem; color:var(--muted); line-height:1.6; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(155,184,255,.2); border-radius:4px; }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="nebula n1"></div><div class="nebula n2"></div><div class="nebula n3"></div>

<div class="app">
  <header>
    <span class="moon-icon">🌙</span>
    <h1>Sueños <em>de Luna</em></h1>
    <p>Cuentos de buenas noches</p>
  </header>
  <div class="current-age-badge">
    <span class="age-line"></span>
    <span class="age-label" id="ageLabel">2–4 años · Bebés y peques</span>
    <span class="age-line"></span>
  </div>
  <div class="stories-grid" id="storiesGrid"></div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar" id="tabBar" role="tablist">
  <button class="tab-btn active" data-age="2-4" role="tab" aria-selected="true"><span class="tab-icon">🐣</span><span class="tab-label">2–4 años</span></button>
  <button class="tab-btn" data-age="4-7" role="tab" aria-selected="false"><span class="tab-icon">🌟</span><span class="tab-label">4–7 años</span></button>
  <button class="tab-btn" data-age="7-10" role="tab" aria-selected="false"><span class="tab-icon">🔭</span><span class="tab-label">7–10 años</span></button>
  <button class="tab-btn" data-age="10+" role="tab" aria-selected="false"><span class="tab-icon">📖</span><span class="tab-label">10+ años</span></button>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-emoji" id="modalEmoji"></div>
      <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-tag" id="modalTag"></div>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-meta">
      <span id="modalTime"></span><span class="dot"></span><span id="modalAge"></span>
    </div>

    <!-- ══ AUDIO PLAYER ══ -->
    <div class="audio-player" id="audioPlayer">
      <div class="audio-top">
        <button class="audio-playbtn" id="playBtn" aria-label="Reproducir cuento">▶</button>
        <div class="audio-info">
          <div class="audio-status" id="audioStatus">Audiocuento</div>
          <div class="audio-voice" id="audioVoiceName">Selecciona una voz →</div>
        </div>
        <div class="soundwave paused" id="soundwave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <button class="audio-stopbtn" id="stopBtn" aria-label="Detener">■</button>
      </div>

      <div class="audio-progress">
        <span class="progress-time" id="progressPct">0%</span>
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="audio-controls">
        <span class="ctrl-label">Vel.</span>
        <button class="ctrl-btn" data-speed="0.7">Lenta</button>
        <button class="ctrl-btn active" data-speed="0.9">Normal</button>
        <button class="ctrl-btn" data-speed="1.1">Rápida</button>
        <div class="ctrl-sep"></div>
        <select class="voice-select" id="voiceSelect" aria-label="Voz narradora">
          <option value="">Cargando voces…</option>
        </select>
      </div>

      <div class="audio-unsupported" id="audioUnsupported" style="display:none">
        ⚠️ Tu navegador no soporta síntesis de voz.<br>Prueba Chrome en Android o Safari en iOS.
      </div>
    </div>
    <!-- ══ END AUDIO PLAYER ══ -->

    <div class="modal-divider"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   STORIES
══════════════════════════════════════════ */
const stories = {
  "2-4": [
    { emoji:"🐻", tag:"Animales", title:"El Osito y su Manta", desc:"El pequeño Pepo no puede dormirse sin su manta favorita.", time:"~3 min", len:"short",
      content:`<p>Pepo era un osito de pelo suave como las nubes. Cada noche, antes de dormir, buscaba su manta amarilla. La manta olía a lavanda y era tan blandita que daba ganas de abrazarla para siempre.</p><p>Una noche, la manta no estaba en la cama. Pepo miró debajo de la almohada. No. Miró detrás de la luna de peluche. Tampoco. Entonces su mamá osita llegó sonriendo.</p><p>—Pepo, mira —dijo, y sacó la manta del cesto de la ropa limpia. Olía a jabón de flores y estaba calentita de la secadora.</p><p>Pepo la abrazó muy fuerte, cerró sus ojitos de botón y en segundos ya estaba soñando con miel dorada y campos de margaritas. Y la manta lo abrazó de vuelta, toda la noche.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🐰", tag:"Sueños", title:"Lua la Conejita de la Luna", desc:"Una conejita vive en la luna y visita a los niños que no pueden dormir.", time:"~3 min", len:"short",
      content:`<p>En la luna vive una conejita llamada Lua. Tiene las orejas largas, largas, y una cola pequeña como una bola de algodón. Cada noche, cuando el mundo se pone oscuro, Lua se sienta en el borde de la luna y mira hacia abajo.</p><p>Busca a los niños que todavía tienen los ojos abiertos. Cuando los encuentra, saca de su cestita una semillita de sueño y la sopla hacia la tierra.</p><p>La semillita vuela, vuela, entra por la ventana abierta y se posa despacito en los párpados del niño. Y entonces... los ojos se vuelven pesados, pesados, como si tuvieran gotitas de rocío.</p><p>Lua sonríe, mueve su cola de algodón y pasa al siguiente niño. Todas las noches hace lo mismo, sin cansarse, porque le encanta su trabajo.</p><p>Así que si esta noche tus ojos se cierran solos... ya sabes quién estuvo aquí.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🌧️", tag:"Naturaleza", title:"La Nube que Quería ser Arcoíris", desc:"Una nube pequeña aprende que llorar también puede ser algo muy bonito.", time:"~4 min", len:"short",
      content:`<p>Todas las nubes del cielo eran blancas y esponjosas. Pero había una que era gris. Se llamaba Nimbi y estaba un poco triste porque cuando lloraba le salía lluvia, y las demás nubes decían que mojaba el picnic de los pájaros.</p><p>Un día, Nimbi lloró mucho, pero mucho. Y cuando paró de llover, el sol salió detrás de ella y algo mágico ocurrió: sus lágrimas se convirtieron en un arcoíris enorme y brillante de siete colores.</p><p>Los pájaros cantaron. Los árboles aplaudieron con sus hojas. Las flores levantaron la cabeza para ver mejor.</p><p>—¡Eres tú, Nimbi! —dijeron las otras nubes—. ¡Tus lágrimas hacen el arcoíris!</p><p>Nimbi entendió que lo que la hacía diferente era también lo más bonito que tenía. Y esa noche se durmió feliz, sabiendo que el arcoíris del día siguiente también sería suyo.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"⭐", tag:"Magia", title:"El Bebé Estrella", desc:"Una estrellita recién nacida aprende a brillar por primera vez.", time:"~3 min", len:"short",
      content:`<p>En el cielo más oscuro nació una estrellita muy pequeña. Era tan pequeña que casi no se veía. Las demás estrellas brillaban fuerte, pero la pequeña solo podía hacer un titilito, tilic, tilic.</p><p>—¿Cuándo brillaré de verdad? —preguntó.</p><p>La estrella más grande del cielo se acercó despacio. —Cada noche que alguien te mire y sonría, crecerás un poquito más —dijo.</p><p>Esa misma noche, una niña asomó la cabeza por la ventana de su cuarto. Miró al cielo y vio la estrellita pequeña titilando. Y sonrió.</p><p>La estrellita sintió algo cálido en su interior. Y brilló un poquito más. Tilic, tilic... tilic.</p><p>¿Cerraste los ojos? La estrellita te está mirando ahora mismo.</p><div class="story-end">✦ · ✦</div>` }
  ],
  "4-7": [
    { emoji:"🦊", tag:"Amistad", title:"El Zorro y la Linterna Rota", desc:"Un zorrito aprende que la oscuridad también puede ser un hogar.", time:"~5 min", len:"medium",
      content:`<p>El zorrito Rolo tenía miedo a la oscuridad. Cada noche, antes de dormir, encendía una linterna anaranjada y la ponía junto a su cama. Pero una noche, la linterna se apagó. La bombilla había muerto con un pequeño clic, y el mundo se volvió negro.</p><p>Rolo se quedó muy quieto, con la cola enrollada sobre el hocico. Escuchó. El bosque afuera hacía ruidos: cri-cri de grillos, fiu-fiu de algún pájaro nocturno, el susurro de las hojas. No parecían ruidos de peligro. Parecían... una conversación.</p><p>—¿Quién habla? —preguntó Rolo en voz muy bajita.</p><p>—Somos la noche —respondió una voz que parecía venir de todas partes y de ninguna—. No tengas miedo. Llevamos aquí mucho más tiempo que tú, y nunca le hemos hecho daño a ningún zorro pequeño que durmiera tranquilo.</p><p>Rolo lo pensó. Era cierto: había dormido muchas noches y siempre había amanecido. La oscuridad nunca lo había comido. Quizás no era tan mala.</p><p>—Está bien —dijo, y puso la cabeza en la almohada—. Pero si te portas mal, te enciendo la linterna.</p><p>La noche se rio muy suavecito, como cuando el viento mueve una cortina, y arrulló a Rolo hasta que sus patas de zorro dejaron de temblar y su respiración se hizo lenta, profunda y tranquila. Y nunca más necesitó la linterna.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🐢", tag:"Aventura", title:"La Tortuga que Llevaba el Mar", desc:"Una tortuga marina guarda el secreto del sueño más profundo.", time:"~5 min", len:"medium",
      content:`<p>La tortuga Mara había cruzado todos los océanos del mundo. En su caparazón no había rayas ni manchas corrientes: cada uno de sus cuadros guardaba un recuerdo del mar. Aquí, la quietud de una laguna azul en calma. Allá, el vaivén suave de una ola de verano.</p><p>Decían las olas que Mara conocía el lugar donde el mar se hace silencio, un sitio tan tranquilo que quien lo escucha cae dormido plácidamente. Un día, un pulpo muy pequeño llamado Tito no podía dormir. Sus ocho brazos se enredaban y su mente daba vueltas. Nadó hasta Mara y le preguntó desesperado: —¿Dónde está ese lugar de silencio?</p><p>Mara lo miró con sus ojos dorados y lentos. —No está en ningún lugar del mapa —dijo—. Está justo debajo de tus propias olas. Cuando dejes de agitar los brazos y te dejes flotar, lo encontrarás.</p><p>Tito cerró sus ocho ojos, extendió sus brazos como algas que se mecen, y sintió cómo el agua lo sostenía. Poco a poco, el mar a su alrededor fue haciéndose más suave, más quieto, más oscuro y tibio. Y se quedó dormido, meciéndose, mientras Mara vigilaba su sueño.</p><p>Esa noche, el océano entero respiró despacio.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🌿", tag:"Naturaleza", title:"El Bosque que Cantaba de Noche", desc:"Un niño descubre que los árboles tienen su propio idioma al anochecer.", time:"~5 min", len:"medium",
      content:`<p>Cada noche, cuando el sol se escondía detrás de las colinas, los árboles del Bosque Verde empezaban a murmurar. Era un sonido muy suave, como páginas que alguien pasa despacio, o como agua que corre entre piedras redondas. Nadie sabía qué decían... excepto un niño llamado Nico.</p><p>Nico vivía en la casa de la linde del bosque. Desde su cama, con la ventana abierta, escuchaba el idioma de los árboles cada noche. Era una canción sin palabras, pero él la entendía perfectamente: Duerme. Descansa. Todo está bien.</p><p>Un verano, Nico enfermó y tuvo que quedarse en cama varios días. La ventana estaba cerrada y no podía escuchar el bosque. Las noches se le hacían largas y el sueño tardaba en llegar.</p><p>Su abuela, que sabía cosas que los adultos suelen olvidar, abrió la ventana apenas un centímetro. —Escucha —le dijo—. El bosque pregunta por ti.</p><p>Nico cerró los ojos y aguzó el oído. Allá, entre las ramas oscuras que se mecían, llegó el murmullo. Esta vez le pareció oír su nombre: Nico, Nico, Nico... como una nana que los robles habían guardado solo para él.</p><p>Aquella noche durmió de un tirón. Desde entonces, siempre dejaba la ventana abierta una rendijita, para que el bosque supiera que él también lo escuchaba.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🌈", tag:"Magia", title:"El Pintor de Sueños", desc:"Un duende con un pincel especial da color a los sueños grises.", time:"~6 min", len:"medium",
      content:`<p>Había una vez un duende llamado Pinto que tenía el trabajo más importante de todo el mundo dormido: pintar los sueños. Cada noche, cuando los niños cerraban los ojos, sus sueños llegaban a la fábrica de Pinto como lienzos en blanco. Y Pinto los llenaba de colores.</p><p>Tenía pinceles de todos los tamaños. Uno muy fino para dibujar estrellas. Otro muy gordo para pintar mares enormes. Y uno especial, con cerdas de nubes, para hacer cielos suaves y esponjosos.</p><p>Una noche, una niña llamada Vera llegó a la fábrica con un sueño muy raro: era completamente gris. No tenía montañas ni mares ni animales. Solo una habitación gris con una silla gris.</p><p>Miró más de cerca el lienzo. En la silla gris había una figura pequeña. Vera. Estaba sola. Pinto entendió: era el sueño de alguien que se había sentido muy sola ese día.</p><p>Con mucho cuidado, tomó su pincel más suave y añadió una ventana al cuadro. Luego pintó un jardín al otro lado. Luego unos pájaros. Luego una puerta abierta. Y finalmente, asomado por la puerta, pintó a un amigo que llegaba corriendo con los brazos abiertos.</p><p>En su cama, Vera sonrió mientras dormía. Y Pinto, satisfecho, pasó al siguiente lienzo en blanco.</p><div class="story-end">✦ · ✦</div>` }
  ],
  "7-10": [
    { emoji:"🐉", tag:"Fantasía", title:"El Dragón que Soñaba con Estrellas", desc:"Un pequeño dragón descubre que sus llamas plateadas pueden pintar el cielo.", time:"~7 min", len:"medium",
      content:`<p>En lo más alto de la montaña Neblina vivía un dragón llamado Lumito. Era pequeño para ser un dragón, y sus escamas brillaban como carbones apagados. Pero Lumito tenía un secreto: cuando soplaba su aliento, en lugar de llamas naranja, le salían pequeñas chispas plateadas.</p><p>Los otros dragones se reían de él. ¿Qué clase de dragón escupe plata? Los dragones de verdad escupen fuego.</p><p>Lumito se alejaba sin responder. Sabía algo que ellos no: cada chispa que soplaba hacia el cielo se convertía en una estrella. Lo había descubierto por accidente, una noche de tormenta en que estornudó hacia arriba y al día siguiente la gente del valle comentaba que había aparecido una estrella nueva.</p><p>Desde entonces, todas las noches, cuando los otros dragones dormían, Lumito trepaba a la punta más alta de la roca y soplaba hacia el cielo. Las chispas volaban hacia arriba, arriba, arriba... y se quedaban fijas, titilando. Era su regalo silencioso al mundo.</p><p>Una noche, una niña pastora llamada Sofía lo vio desde el valle. No tuvo miedo. Subió por el camino de piedra con su manta sobre los hombros y se sentó a su lado, sin decir nada.</p><p>—¿Por qué lo haces? —preguntó Sofía al fin.</p><p>Lumito pensó un momento. —Para que nadie duerma en la oscuridad completa —respondió con voz suave como el humo de una vela.</p><p>Sofía sonrió y apoyó la cabeza en las escamas cálidas del dragón. Lumito sopló una chispa especialmente grande que cruzó todo el cielo y se convirtió en la estrella más brillante de la noche. Y desde entonces, cada vez que veas una estrella especialmente brillante, ya sabes quién la puso allí.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"⭐", tag:"Misterio", title:"La Niña que Coleccionaba Estrellas Caídas", desc:"Elena descubre que las estrellas en un frasco pueden vencer al miedo.", time:"~8 min", len:"long",
      content:`<p>Elena tenía un frasco de cristal azul sobre su mesita de noche. No guardaba caramelos ni monedas como creían sus hermanos. Guardaba estrellas fugaces. Pequeñísimas, del tamaño de un grano de arroz, pero que brillaban con luz propia toda la noche.</p><p>Las coleccionaba así: cuando veía una estrella caer, cerraba los ojos muy fuerte, hacía el deseo y abría la palma hacia el cielo. Si el deseo era genuino, la estrella dejaba un pedacito de sí misma en su mano.</p><p>Su primer deseo había sido que su perro Canelo se curara de la pata rota. El segundo, que sus padres dejaran de discutir tanto. El tercero, más pequeño pero igual de sincero, que el helado de fresa de los domingos nunca se acabara.</p><p>El frasco tenía nueve estrellas cuando llegó la noche de la tormenta grande. Los truenos retumbaban como si alguien moviera todos los muebles del cielo. Los relámpagos dibujaban figuras raras en el techo.</p><p>Elena se tapó la cabeza con la almohada. Entonces recordó el frasco. Con cuidado, lo agarró con las dos manos. Las nueve estrellas titilaron dentro del cristal azul y una luz suave y dorada llenó su cuarto. La tormenta seguía afuera, pero dentro todo era cálido y quieto.</p><p>Elena se recostó mirando las estrellas girar despacio. Nueve destellos, nueve deseos, nueve pequeñas promesas de que el mundo tenía más magia que miedo. Y con ese pensamiento suave como plumas, se fue quedando dormida.</p><p>A la mañana siguiente, el frasco tenía diez estrellas. Elena lo miró largo rato. Allí estaba la décima: más pequeña que las demás, casi transparente, pulsando con una luz color lavanda. Nunca supo cómo llegó. Pero sospechaba que era un regalo de la propia tormenta.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🚂", tag:"Aventura", title:"El Tren que Solo Viaja de Noche", desc:"Un tren misterioso recoge a quienes no pueden dormir y los lleva lejos.", time:"~9 min", len:"long",
      content:`<p>A las doce en punto de cada noche, si te quedas muy quieto y escuchas con atención, quizás oigas un sonido lejano: chu-chu-chu. No es cualquier tren. Es el Noctámbulo, y su vía no aparece en ningún mapa.</p><p>Marco lo oyó por primera vez un martes. Llevaba tres noches sin dormir porque al día siguiente tenía que hacer una presentación delante de toda la clase y el miedo le tapaba el pecho como una piedra. Se asomó a la ventana y ahí estaba: un tren oscuro con ventanas doradas, deteniéndose silenciosamente frente a su calle.</p><p>En la puerta había un revisor con sombrero de terciopelo azul y una linterna que proyectaba constelaciones en el suelo. —¿Destino? —preguntó. —No sé —contestó Marco. —Perfecto. Ese es el mejor destino —dijo el revisor.</p><p>El tren por dentro era más grande de lo que parecía. Había vagones con hamacas, vagones con telescopios, vagones llenos de libros con los lomos de colores imposibles.</p><p>Marco encontró un vagón con ventanas enormes. El paisaje que pasaba afuera no era su ciudad. Eran montañas de nieve azul, ríos de luz líquida, pueblos diminutos donde cada ventana encendida era una historia diferente.</p><p>—¿A dónde vamos de verdad? —le preguntó a una niña del asiento de al lado. —A donde necesitas —dijo ella—. Yo fui la semana pasada al bosque del olvido. Volví nueva. —Yo necesito valor —dijo Marco—. Mañana tengo que hablar delante de mucha gente. —Entonces irás a las montañas del eco. Allí tu propia voz vuelve a ti más fuerte de lo que la mandaste.</p><p>Marco no recordó el resto del viaje porque se quedó dormido en el asiento de terciopelo. Cuando despertó era de mañana y estaba en su cama. Pero en la mano tenía algo: un pequeño billete de tren color azul oscuro, con una sola palabra impresa: Puedes.</p><p>Aquel día hizo la presentación. Le temblaron las manos, pero su voz viajó lejos.</p><div class="story-end">✦ · ✦</div>` }
  ],
  "10+": [
    { emoji:"🌊", tag:"Reflexión", title:"El Faro del Fin del Mapa", desc:"Una adolescente descubre un faro que solo aparece cuando alguien lo necesita.", time:"~12 min", len:"long",
      content:`<p>Nadie en el pueblo hablaba del Faro del Confín. Aparecía en algunas fotos antiguas del puerto, pero si preguntabas a los adultos, fruncían el ceño y decían que era un error del revelado. Nora, sin embargo, lo había visto con sus propios ojos: una noche de diciembre, desde el acantilado, una luz lenta y acompasada parpadeando más allá donde terminaban las cartas de navegación.</p><p>Tenía catorce años y un cuaderno lleno de preguntas sin respuesta. ¿Por qué se había marchado su padre sin dejar dirección? ¿Por qué su mejor amiga Ana dejó de hablarle de un día para otro? ¿Por qué a veces sentía que el mundo avanzaba y ella estaba parada en el centro viendo pasar las cosas?</p><h3>La noche que llegó al faro</h3><p>Fue en enero cuando encontró el camino. Una senda entre las rocas que juraba no haber visto nunca. Llegó a una plataforma de piedra donde el faro giraba en silencio. La puerta estaba abierta. Adentro, una escalera de caracol subía entre estantes llenos de objetos: botellas con mensajes, brújulas rotas, relojes parados a distintas horas.</p><p>En la cima había un cuarto redondo. Una silla, una mesa, y sobre ella un libro abierto. Las páginas estaban en blanco... excepto la primera, donde alguien había escrito: Aquí viene el que no puede dormir porque carga algo demasiado pesado para una sola persona. Escribe lo que pesas. El mar sabe escuchar.</p><p>Nora sacó el bolígrafo del bolsillo de la chaqueta y escribió. Escribió sobre su padre. Sobre Ana. Sobre la sensación de estar parada mientras el mundo gira. Escribió durante una hora, con el faro girando sobre ella y el mar rugiendo suave catorce pisos más abajo.</p><h3>Lo que encontró al terminar</h3><p>Cuando levantó los ojos, había amanecido. Y en la página siguiente, donde antes no había nada, aparecieron unas líneas: Las cosas que pesan no desaparecen cuando se nombran. Pero cambian de forma. Lo que era una piedra se vuelve agua. Lo que era muro se vuelve puente. No estás parada, Nora. Estás echando raíces.</p><p>Nora cerró el libro. No supo quién había escrito eso ni cómo sabían su nombre. Bajó las escaleras despacio y miró el mar largo rato. Esa tarde le escribió a Ana. No para pedir explicaciones: solo para decirle que la echaba de menos. Ana respondió a los cinco minutos.</p><p>El faro no volvió a aparecer en el acantilado. Pero a veces, cuando la noche se ponía muy larga, Nora sentía su luz girar despacio dentro del pecho. Y era suficiente para quedarse dormida.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🗝️", tag:"Misterio", title:"Las Cartas del Abuelo Invisible", desc:"Cada mañana aparece una carta del abuelo que murió hace un año. Nadie sabe cómo.", time:"~13 min", len:"long",
      content:`<p>La primera carta apareció en el escritorio de Diego el lunes tres de marzo, exactamente un año después de que el abuelo Ernesto muriera. Estaba en un sobre color crema, escrita a mano con la letra redonda e inclinada que Diego habría reconocido en cualquier parte. Decía: Diego, sé que esta noche no puedes dormir porque hoy es el aniversario. Está bien no estar bien. Eso también es querer a alguien. Con cariño, el abuelo.</p><p>Diego pensó que era una broma de su madre. Pero la segunda carta apareció el miércoles, cuando Diego perdió el partido de fútbol más importante del año. Y la tercera el viernes, cuando discutió con su mejor amigo. Ninguna carta mencionaba cosas imposibles. Solo hablaban de Diego. De lo que estaba viviendo ese día concreto.</p><h3>La investigación</h3><p>Diego instaló su teléfono apuntando al escritorio y grabó toda una noche. A las tres con cuarenta y siete de la madrugada, la pantalla se llenó de estática blanca durante exactamente doce segundos. Cuando volvió la imagen normal, el sobre estaba allí. No había entrado nadie. No había sonado nada.</p><p>Le mostró el vídeo a su madre. Ella fue a su dormitorio y volvió con una caja de zapatos. Dentro había cartas. Muchas. Con la misma letra. Me llegan desde que murió, dijo. No sé cómo. Al principio pensé que me las había dejado escritas de antemano. Pero algunas mencionan cosas que pasaron después de que él murió.</p><p>Se sentaron en la cama y las leyeron juntos. Una carta hablaba del día en que Diego reprobó matemáticas. Otra, del día en que su madre llegó llorando del trabajo. Otra más decía solo: El helecho que comprasteis el martes necesita menos agua. Os lo digo con cariño.</p><p>Diego y su madre se miraron. Se rieron. Era la primera vez que se reían juntos desde hacía meses.</p><h3>La última carta</h3><p>La décima carta decía: Esta es la última que os escribo, no porque me haya ido a ningún sitio más lejos, sino porque ya no la necesitáis. He visto cómo os miráis. He visto que habláis de nuevo. Mi trabajo aquí está hecho. Diego: hubo un Diego de trece años, igual que tú, que también perdió a alguien y también pensó que el mundo se había vuelto demasiado silencioso. Ese Diego encontró la manera de seguir. Tú también la encontrarás. Duerme, que mañana hay partido. Y no discutas con el árbitro aunque tenga razón.</p><p>Diego dobló la carta con cuidado. Apagó la luz. Y durmió de una manera que no recordaba desde hacía un año: sin ese peso en el centro del pecho. Solo el ruido normal de la noche, que es el ruido de alguien que te cuida desde lejos.</p><div class="story-end">✦ · ✦</div>` },
    { emoji:"🌌", tag:"Ciencia ficción", title:"La Biblioteca del Sueño 47", desc:"En 2180 los sueños se archivan. Una chica encuentra el sueño de alguien que aún no ha nacido.", time:"~14 min", len:"long",
      content:`<p>En el año dos mil ciento ochenta, los sueños dejaron de ser privados. No fue algo que ocurrió de golpe: primero fue voluntario, luego fue recomendado, y finalmente fue el sistema por defecto. Cada mañana, mientras te cepillabas los dientes, el implante cerebral subía un resumen codificado de lo que habías soñado al Archivo Central de Sueños. Millones de sueños por noche. Una biblioteca infinita del inconsciente colectivo.</p><p>Asha trabajaba allí. Su cargo era catalogadora de sueños anómalos, lo que significaba que revisaba los sueños que el algoritmo no sabía clasificar. Sueños demasiado extraños, demasiado coherentes, demasiado fuera de cualquier patrón conocido. El Sueño cuarenta y siete llegó un martes.</p><h3>El sueño que no debía existir</h3><p>No tenía identificador de usuario. No tenía fecha de carga. No tenía datos biométricos asociados. Simplemente estaba ahí, en la base de datos, como si siempre hubiera estado. El algoritmo lo había marcado en rojo: Origen desconocido. Clasificación imposible.</p><p>Asha abrió el archivo. El Sueño cuarenta y siete mostraba una ciudad que Asha reconoció de inmediato porque era la suya, pero diferente. Los edificios tenían plantas en las fachadas, los coches no existían, y la gente caminaba por calles anchas hablando cara a cara. La luz era distinta: más suave, más dorada.</p><p>En el centro de esa ciudad, una niña de unos diez años miraba a la cámara del sueño directamente. Lo que ningún soñador hacía nunca, porque en los sueños propios nunca hay una cámara que mirar. La niña dijo: Sé que me estás viendo. Hola. Todavía no existo, pero existiré. Y cuando exista, voy a necesitar que alguien haya guardado esto.</p><h3>Lo que Asha decidió</h3><p>Asha pasó tres semanas analizando el archivo. No encontró origen. No encontró falsificación. La norma era marcar los sueños sin origen como corruptos y eliminarlos. Asha abrió el formulario de eliminación. Lo dejó a medias. Cerró el formulario.</p><p>Copió el sueño en un archivo local y lo guardó en el único lugar donde el Archivo Central no tenía acceso: su propia memoria, en un sueño que esa noche decidió tener a propósito. Lo soñó entero. La ciudad dorada, la niña, la frase.</p><p>Cuando despertó, el sueño estaba en el Archivo con su nombre, su identificador, su fecha. Ya no era un sueño sin origen. Ahora era suyo. Y si algún día esa niña existía y buscaba ese archivo, lo encontraría. Con una nota al margen: Guardado para ti. Ya puedes existir.</p><p>Asha apagó su terminal, se puso el implante en modo no grabar, y durmió por primera vez en semanas sin soñar nada en absoluto. A veces el descanso más profundo es el que no deja rastro.</p><div class="story-end">✦ · ✦</div>` }
  ]
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let currentAge = "2-4";
const ageLabelMap = { "2-4":"2–4 años · Bebés y peques", "4-7":"4–7 años · Primeros lectores", "7-10":"7–10 años · Aventureros", "10+":"10+ años · Grandes soñadores" };

/* ══════════════════════════════════════════
   RENDER CARDS
══════════════════════════════════════════ */
function renderStories(age) {
  const grid = document.getElementById('storiesGrid');
  const list = stories[age] || [];
  grid.innerHTML = '';
  if (!list.length) { grid.innerHTML = `<div class="empty-state"><div class="es-icon">🌙</div><p>Pronto habrá más cuentos para esta edad.</p></div>`; return; }
  list.forEach((s, i) => {
    const lenText = { short:'Corto', medium:'Medio', long:'Largo' }[s.len];
    const card = document.createElement('div');
    card.className = 'story-card';
    card.setAttribute('role','button'); card.setAttribute('tabindex','0');
    card.innerHTML = `
      <div class="ribbon ${s.len}">${lenText}</div>
      <div class="card-top">
        <div class="card-emoji">${s.emoji}</div>
        <div class="card-meta">
          <div class="card-tag">${s.tag}</div>
          <div class="card-title">${s.title}</div>
          <div class="card-desc">${s.desc}</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
      <div class="card-footer">
        <span class="card-time">🕐 ${s.time}</span>
        <span class="card-dot"></span>
        <span class="card-age">${age === "10+" ? "10+ años" : age + " años"}</span>
        <span style="margin-left:auto;font-size:0.7rem;color:var(--muted)">🎧 Audiocuento</span>
      </div>`;
    card.addEventListener('click', () => openStory(s, age));
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') openStory(s,age); });
    grid.appendChild(card);
    requestAnimationFrame(() => setTimeout(() => card.classList.add('visible'), i * 80));
  });
  document.getElementById('ageLabel').textContent = ageLabelMap[age];
}

/* ══════════════════════════════════════════
   TAB BAR
══════════════════════════════════════════ */
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  ttsStop();
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
  btn.classList.add('active'); btn.setAttribute('aria-selected','true');
  currentAge = btn.dataset.age;
  renderStories(currentAge);
  window.scrollTo({ top:0, behavior:'smooth' });
});

/* ══════════════════════════════════════════
   TTS ENGINE
══════════════════════════════════════════ */
const synth = window.speechSynthesis;
let ttsSupported = !!synth;
let ttsUtterance = null;
let ttsPlaying   = false;
let ttsText      = '';
let ttsSpeed     = 0.9;
let ttsVoice     = null;
let ttsWordCount = 0;
let ttsWordTotal = 0;
let ttsProgressTimer = null;

const playBtn      = document.getElementById('playBtn');
const stopBtn      = document.getElementById('stopBtn');
const audioStatus  = document.getElementById('audioStatus');
const audioVoice   = document.getElementById('audioVoiceName');
const soundwave    = document.getElementById('soundwave');
const progressFill = document.getElementById('progressFill');
const progressPct  = document.getElementById('progressPct');
const voiceSelect  = document.getElementById('voiceSelect');
const unsupported  = document.getElementById('audioUnsupported');

/* Populate voices */
function loadVoices() {
  if (!ttsSupported) { unsupported.style.display='block'; playBtn.disabled=true; return; }
  const voices = synth.getVoices();
  const esVoices = voices.filter(v => v.lang.startsWith('es'));
  const allVoices = esVoices.length ? esVoices : voices;

  voiceSelect.innerHTML = '';
  if (!allVoices.length) {
    voiceSelect.innerHTML = '<option value="">Sin voces disponibles</option>';
    return;
  }

  allVoices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name.replace(/Microsoft|Google|Apple/g,'').trim()} (${v.lang})`;
    opt.dataset.index = voices.indexOf(v);
    voiceSelect.appendChild(opt);
  });

  // Auto-select a good Spanish female voice if possible
  const preferred = allVoices.findIndex(v => /es[-_](ES|MX|US|419)/i.test(v.lang) && /female|woman|marta|lucia|paulina|helena|jorge|pablo/i.test(v.name));
  voiceSelect.selectedIndex = preferred >= 0 ? preferred : 0;
  updateVoice();
}

function updateVoice() {
  const voices = synth.getVoices();
  const sel = voiceSelect.options[voiceSelect.selectedIndex];
  if (!sel) return;
  const realIndex = parseInt(sel.dataset.index);
  ttsVoice = voices[realIndex] || null;
  audioVoice.textContent = sel.textContent;
}

voiceSelect.addEventListener('change', () => { updateVoice(); if(ttsPlaying) { ttsStop(); setTimeout(ttsPlay,120); } });

if (synth) {
  synth.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 800); // fallback
}

/* Speed buttons */
document.querySelectorAll('[data-speed]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ttsSpeed = parseFloat(btn.dataset.speed);
    if (ttsPlaying) { ttsStop(); setTimeout(ttsPlay, 120); }
  });
});

/* Strip HTML tags for TTS */
function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function ttsPlay() {
  if (!ttsSupported || !ttsText) return;
  if (synth.speaking) synth.cancel();

  ttsUtterance = new SpeechSynthesisUtterance(ttsText);
  ttsUtterance.lang  = ttsVoice ? ttsVoice.lang : 'es-ES';
  ttsUtterance.rate  = ttsSpeed;
  ttsUtterance.pitch = 0.95;
  if (ttsVoice) ttsUtterance.voice = ttsVoice;

  ttsWordTotal = ttsText.split(/\s+/).length;
  ttsWordCount = 0;

  ttsUtterance.onboundary = e => {
    if (e.name === 'word') {
      ttsWordCount++;
      const pct = Math.min(100, Math.round((ttsWordCount / ttsWordTotal) * 100));
      progressFill.style.width = pct + '%';
      progressPct.textContent  = pct + '%';
    }
  };

  ttsUtterance.onstart = () => {
    ttsPlaying = true;
    playBtn.textContent = '⏸';
    playBtn.classList.add('playing');
    soundwave.classList.remove('paused');
    audioStatus.textContent = 'Narrando…';
    startProgressFallback();
  };

  ttsUtterance.onpause = () => {
    soundwave.classList.add('paused');
    audioStatus.textContent = 'En pausa';
    clearInterval(ttsProgressTimer);
  };

  ttsUtterance.onresume = () => {
    soundwave.classList.remove('paused');
    audioStatus.textContent = 'Narrando…';
    startProgressFallback();
  };

  ttsUtterance.onend = () => {
    ttsPlaying = false;
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
    soundwave.classList.add('paused');
    audioStatus.textContent = '✓ Fin del cuento';
    progressFill.style.width = '100%';
    progressPct.textContent  = '100%';
    clearInterval(ttsProgressTimer);
  };

  ttsUtterance.onerror = () => {
    ttsPlaying = false;
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
    soundwave.classList.add('paused');
    audioStatus.textContent = 'Audiocuento';
    clearInterval(ttsProgressTimer);
  };

  synth.speak(ttsUtterance);
}

/* Fallback progress for browsers that don't fire onboundary */
function startProgressFallback() {
  clearInterval(ttsProgressTimer);
  const charCount   = ttsText.length;
  const estDuration = (charCount / 15) / ttsSpeed * 1000; // ~15 chars/sec
  const startTime   = Date.now();
  ttsProgressTimer  = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct = Math.min(99, Math.round((elapsed / estDuration) * 100));
    if (parseFloat(progressFill.style.width) < pct) {
      progressFill.style.width = pct + '%';
      progressPct.textContent  = pct + '%';
    }
  }, 500);
}

function ttsPause() {
  if (synth.speaking && !synth.paused) { synth.pause(); ttsPlaying = false; playBtn.textContent='▶'; playBtn.classList.remove('playing'); }
}

function ttsResume() {
  if (synth.paused) { synth.resume(); ttsPlaying = true; playBtn.textContent='⏸'; playBtn.classList.add('playing'); }
}

function ttsStop() {
  synth && synth.cancel();
  ttsPlaying = false;
  clearInterval(ttsProgressTimer);
  playBtn.textContent = '▶';
  playBtn.classList.remove('playing');
  soundwave.classList.add('paused');
  audioStatus.textContent = 'Audiocuento';
  progressFill.style.width = '0%';
  progressPct.textContent  = '0%';
}

playBtn.addEventListener('click', () => {
  if (!ttsSupported) return;
  if (!ttsText) return;
  if (synth.paused) { ttsResume(); }
  else if (ttsPlaying) { ttsPause(); }
  else { ttsPlay(); }
});

stopBtn.addEventListener('click', ttsStop);

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
const overlay  = document.getElementById('modalOverlay');
const sheet    = document.getElementById('modalSheet');
const closeBtn = document.getElementById('modalClose');

function openStory(s, age) {
  ttsStop();
  document.getElementById('modalEmoji').textContent  = s.emoji;
  document.getElementById('modalTag').textContent    = s.tag;
  document.getElementById('modalTitle').textContent  = s.title;
  document.getElementById('modalTime').textContent   = s.time + ' de lectura';
  document.getElementById('modalAge').textContent    = age === "10+" ? "10+ años" : age + " años";
  document.getElementById('modalBody').innerHTML     = s.content;
  ttsText = stripHtml(s.content);
  overlay.classList.add('open');
  sheet.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  // Check TTS support indicator
  if (!ttsSupported) { unsupported.style.display = 'block'; }
}

function closeModal() {
  ttsStop();
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

let startY = 0;
sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive:true });
sheet.addEventListener('touchend',   e => { if(sheet.scrollTop===0 && e.changedTouches[0].clientY - startY > 70) closeModal(); }, { passive:true });

/* ══════════════════════════════════════════
   STARS CANVAS
══════════════════════════════════════════ */
const canvas = document.getElementById('stars-canvas');
const ctx    = canvas.getContext('2d');
let stars    = [];
function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; initStars(); }
function initStars() {
  stars = [];
  const n = Math.floor((canvas.width * canvas.height) / 5500);
  for (let i=0;i<n;i++) stars.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.3+0.15, o:Math.random()*0.7+0.1, speed:Math.random()*0.007+0.002, phase:Math.random()*Math.PI*2 });
}
function drawStars(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => { const alpha=s.o*(0.55+0.45*Math.sin(t*s.speed+s.phase)); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(200,220,255,${alpha})`; ctx.fill(); });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(drawStars);

/* INIT */
renderStories(currentAge);
</script>
</body>
</html>
