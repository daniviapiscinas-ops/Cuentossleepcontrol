  {
    emoji:"🌌", tag:"Ciencia ficción", title:"La Biblioteca del Sueño 47", desc:"En 2180 los sueños se archivan. Una chica encuentra el sueño de alguien que aún no ha nacido.", time:"~14 min", len:"long",
    content:`<p>En el año 2180, los sueños dejaron de ser privados. Primero fue voluntario, luego recomendado y finalmente el sistema por defecto. Cada mañana, mientras te cepillabas los dientes, el implante cerebral subía un resumen codificado de lo que habías soñado al Archivo Central de Sueños. Millones de sueños por noche. Una biblioteca infinita del inconsciente colectivo.</p><p>Asha trabajaba allí. Su cargo era catalogadora de sueños anómalos: revisaba los sueños que el algoritmo no sabía clasificar. El Sueño 47 llegó un martes.</p><h3>El sueño que no debía existir</h3><p>No tenía ID de usuario. No tenía fecha de carga. No tenía datos biométricos. Simplemente estaba ahí. El algoritmo lo había marcado en rojo: Origen desconocido. Clasificación imposible.</p><p>Asha abrió el archivo. El Sueño 47 mostraba una ciudad que reconoció de inmediato porque era la suya, pero diferente. Los edificios tenían plantas en las fachadas, los coches no existían, y la gente caminaba por calles anchas hablando cara a cara. La luz era más suave, más dorada.</p><p>En el centro de esa ciudad, una niña de unos diez años miraba a la cámara del sueño directamente. Lo que ningún soñador hacía nunca. La niña dijo: Sé que me estás viendo. Hola. Todavía no existo, pero existiré. Y cuando exista, voy a necesitar que alguien haya guardado esto.</p><h3>Lo que Asha decidió</h3><p>Asha pasó tres semanas analizando el archivo. No encontró origen. No encontró falsificación. La norma era marcar los sueños sin origen como corruptos y eliminarlos. Asha abrió el formulario de eliminación. Lo dejó a medias. Cerró el formulario.</p><p>Copió el sueño en un archivo local y lo guardó en el único lugar donde el Archivo Central no tenía acceso: su propia memoria, en un sueño que esa noche decidió tener a propósito. Lo soñó entero. La ciudad dorada, la niña, la frase.</p><p>Cuando despertó, el sueño estaba en el Archivo con su nombre, su ID, su fecha. Ya no era un sueño sin origen. Ahora era suyo. Y si algún día esa niña existía y buscaba ese archivo, lo encontraría. Con una nota al margen: Guardado para ti. Ya puedes existir.</p><p>Asha apagó su terminal y durmió por primera vez en semanas sin soñar nada en absoluto. A veces el descanso más profundo es el que no deja rastro.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"📻", tag:"Misterio", title:"La Emisora del Fin del Mundo", desc:"Una radio vieja sintoniza una emisora que transmite desde el futuro solo a medianoche.", time:"~12 min", len:"long",
    content:`<p>La radio era de los años cincuenta: una caja de madera con diales amarillentos y un altavoz cubierto de tela naranja. Ramón la encontró en el trastero de su abuela y la arregló pasando varios sábados con un soldador y vídeos de YouTube.</p><p>La primera noche que la encendió ya funcionando, era medianoche. Buscó emisoras. Música estática, un partido de fútbol en algún idioma extraño, una voz hablando de política. Y luego, en una frecuencia entre el 88 y el 89, algo diferente.</p><p>Una voz joven, clara, que hablaba en español. Decía: —...y así fue como en el verano de dos mil cuarenta y tres decidieron cambiar la ley. Cosa que a nosotros, los que lo estamos viviendo ahora, nos parece increíble, pero que en su momento fue revolucionario...</p><p>Ramón frunció el ceño. Dos mil cuarenta y tres. Él tenía dieciséis años en dos mil veinticuatro. En dos mil cuarenta y tres tendría treinta y cinco.</p><p>Tomó un cuaderno y empezó a anotar todo lo que decía la voz. Escuchó durante dos horas. Luego la señal se cortó exactamente a las dos de la madrugada.</p><h3>Lo que anotó</h3><p>La voz hablaba de cosas cotidianas del futuro con la naturalidad con que uno habla del presente. Mencionaba una tecnología de traducción simultánea universal, ciudades con más árboles que coches, y algo llamado «los jardines de datos» que Ramón no pudo entender del todo.</p><p>Pero lo más impactante no era la tecnología. Era el tono. La voz sonaba... tranquila. Como si el mundo en dos mil cuarenta y tres, aunque diferente, no fuera un lugar terrible. Como si hubieran sobrevivido y encontrado maneras.</p><p>Ramón cerró el cuaderno. Eran las dos pasadas. Apagó la radio, fue a su cama y se quedó mirando el techo un rato.</p><p>No sabía si la radio sintonizaba el futuro de verdad, un programa de ficción muy convincente, o algo que su mente cansada había imaginado. Pero lo que sí sabía era que se sentía extrañamente esperanzado.</p><p>Que fuera lo que fuera, el mundo seguía transmitiendo.</p><p>Y eso era suficiente para dormir bien.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🎻", tag:"Reflexión", title:"La Violinista que Tocaba Para los Árboles", desc:"Una chica descubre que su música tiene un efecto distinto cuando nadie la escucha.", time:"~11 min", len:"long",
    content:`<p>Sofía llevaba seis años estudiando violín y todavía le temblaban las manos antes de cada actuación. No era falta de técnica: su profesora decía que tenía oído perfecto y memoria musical extraordinaria. Era otra cosa. Era el miedo a ser juzgada.</p><p>Así que una noche, sin decírselo a nadie, cogió el violín, salió al jardín de la urbanización y se puso a tocar entre los árboles. Eran las once de la noche. Nadie la veía. Nadie la evaluaba.</p><p>Tocó la sonata que llevaba tres meses preparando para el recital. La tocó entera, sin parar, mirando las copas de los árboles que se movían un poco con el viento. Y fue la mejor interpretación que había hecho en su vida. Notas largas, respiradas, sin prisas. Las partes difíciles salieron solas porque no tenía miedo de fallar.</p><h3>El descubrimiento</h3><p>Volvió al jardín la noche siguiente. Y la siguiente. Siempre entre las once y las doce, siempre sola, siempre para los árboles.</p><p>Una semana antes del recital, su profesora le preguntó: —¿Qué ha pasado? Tu forma de tocar ha cambiado.</p><p>—Toco para los árboles —dijo Sofía sin pensar.</p><p>La profesora la miró un momento. —Explícamelo.</p><p>Sofía intentó explicarlo. No sé cuándo cometí el error de creer que tocar era para que otros me aprobaran. Los árboles no aprueban ni suspenden. Solo escuchan. Y cuando toco para ellos, toco para mí.</p><p>El día del recital, Sofía salió al escenario. Las luces eran fuertes y el auditorio estaba lleno. Sintió el temblor habitual en las manos. Respiró hondo. Cerró los ojos un momento y pensó: hay árboles ahí fuera. Siempre hay árboles.</p><p>Y tocó la mejor actuación de su vida.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌿", tag:"Reflexión", title:"El Jardín que Recordaba", desc:"Un jardín antiguo guarda la memoria de todos los que han cuidado de él.", time:"~11 min", len:"long",
    content:`<p>El jardín de la casa de campo tenía setenta años. Lo sabía porque en el tronco de la higuera central alguien había tallado una fecha: 1954. Desde entonces, varias familias habían vivido en la casa y todas habían cuidado el jardín a su manera.</p><p>Cuando la familia de Lucas llegó en verano, el jardín parecía abandonado: hierbas altas, rosales sin podar, un sendero de piedra casi invisible bajo la vegetación. Pero Lucas, que tenía quince años y no sabía nada de plantas, empezó a limpiar por aburrimiento. Y mientras limpiaba, descubrió cosas.</p><p>Debajo de las hierbas: un mosaico de azulejos azules y blancos que formaba un pez. Alguien lo había puesto con mucho cuidado en los años sesenta o setenta. Detrás del rosal: una pequeña placa de metal con nombres grabados: Familia Orts, 1971-1985. En la esquina norte: una higuera tan cargada de frutos que las ramas se doblaban.</p><h3>Lo que el jardín contaba</h3><p>Lucas fue reconstruyendo la historia. Los azulejos del pez eran de una familia de pescadores que había comprado la casa en los sesenta. Los Orts habían plantado el rosal y puesto la placa. Alguien, en algún momento de los noventa, había colocado un comedero para pájaros que ahora estaba oxidado pero en pie.</p><p>Y la higuera. La higuera que alguien había plantado en 1954 y que seguía dando frutos setenta años después.</p><p>Lucas se sentó debajo de ella una tarde y comió un higo maduro. Pensó en todas las personas que habían comido de ese mismo árbol antes que él. Personas que ya no existían. Personas que no sabían quién era Lucas ni que existiría. Y sin embargo, el árbol que habían plantado lo estaba alimentando a él, en este verano, en este momento.</p><p>Esa noche durmió en la hamaca del jardín. Las estrellas se veían perfectamente desde allí. Y pensó que los jardines son la única forma que tiene el pasado de darte la mano. Y que vale la pena cuidarlos.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🕰️", tag:"Fantasía", title:"El Relojero que Vendía Tiempo", desc:"Un anciano relojero ofrece algo imposible: tiempo extra. Pero tiene un precio inesperado.", time:"~12 min", len:"long",
    content:`<p>La tienda de Mosén el relojero estaba en una callejuela que Ana encontró por accidente. No aparecía en los mapas del móvil. El escaparate estaba lleno de relojes: de pared, de bolsillo, de pulsera, de arena, de agua. Todos funcionando. Todos marcando horas distintas.</p><p>Ana entró. El anciano detrás del mostrador levantó la vista sin sorpresa.</p><p>—Necesito más tiempo —dijo Ana, que tenía dieciséis años y tres exámenes en tres días y un proyecto de grupo que nadie había empezado—. Solo unas horas más cada día. Lo que sea.</p><p>—Puedo darte tiempo —dijo el relojero—. Pero antes necesito saber de dónde lo quieres quitar.</p><p>—¿Cómo que de dónde?</p><p>—El tiempo no se crea. Solo se redistribuye. Si quieres más horas de estudio, tengo que quitarlas de algún sitio. ¿De qué estás dispuesta a prescindir? ¿Del sueño? ¿De las comidas? ¿Del tiempo con personas que quieres?</p><p>Ana abrió la boca y la cerró. Pensó. El relojero esperó con paciencia.</p><p>—No quiero quitarlo del sueño —dijo por fin—. Ni de las comidas. Ni de mi gente.</p><p>—Entonces de dónde.</p><p>—No lo sé.</p><p>—Esa es, en realidad, la respuesta más honesta que me han dado en cuarenta años. —El relojero cerró el libro que tenía abierto—. No tengo tiempo para venderte. Pero puedo decirte algo gratis: la mayoría de la gente que viene aquí creyendo que le falta tiempo, lo que tiene en realidad es demasiadas cosas en su lista.</p><p>Ana se fue sin comprar nada. Pero esa noche hizo algo que no había hecho en semanas: organizó lo que era urgente de verdad, descartó lo que no lo era, y se fue a dormir a las once.</p><p>Durmió ocho horas. Y al día siguiente rindió mejor de lo que esperaba.</p><p>Nunca volvió a encontrar la callejuela. Pero tampoco la necesitó.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌒", tag:"Reflexión", title:"El Año que Duró Dos Veces", desc:"Un chico descubre que algunos años son más largos por dentro que por fuera.", time:"~11 min", len:"long",
    content:`<p>El año que David cumplió trece fue el más largo de su vida. No en el reloj ni en el calendario: en el interior. Ocurrieron demasiadas cosas en doce meses. Se fue su mejor amigo a vivir a otra ciudad. Murió su perro. Sus padres anunciaron la separación. Empezó el instituto y todo le resultó enorme y ruidoso y extraño.</p><p>A finales de diciembre, su tío Marcos le preguntó: —¿Cómo ha ido el año?</p><p>—Eterno —dijo David.</p><p>—Los años que cambian mucho se sienten más largos —dijo su tío—. Es una buena señal, aunque duela.</p><p>David frunció el ceño. —¿Cómo puede ser buena señal?</p><h3>Lo que el tío Marcos explicó</h3><p>Marcos era fotógrafo. Vivía de los viajes y las imágenes. Se sentó en el sofá con David y le dijo: —Cuando eras pequeño y cada verano en el pueblo era igual al anterior, el tiempo pasaba volando. Pero cuando fuiste por primera vez al mar, ese verano lo recuerdas completo, ¿verdad? Cada momento.</p><p>David asintió.</p><p>—Eso es porque el cerebro guarda más detalles de lo nuevo y de lo difícil. Los años en que todo cambia se quedan grabados con más resolución. Son más pesados. Pero también son más tuyos.</p><p>—¿Y sirven para algo?</p><p>—Son la materia de la que estás hecho. Dentro de diez años, cuando te pregunten quién eres, la respuesta estará construida en gran parte con lo que pasó este año. No porque sea lo único que importa, sino porque es lo que más trabajo te costó.</p><p>David se quedó callado un rato. Luego preguntó: —¿Se hace más corto?</p><p>—Los años siguientes sí. Pero nunca serán tan tuyos como este.</p><p>David fue a su cuarto. Se sentó en la cama y miró el techo. Pensó en su amigo, en su perro, en el instituto, en sus padres. Pensó que todas esas cosas seguían siendo suyas aunque dolieran. Eran su año. Su año largo.</p><p>Y con esa sensación extraña mezcla de peso y de pertenencia, apagó la luz y se quedó dormido.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🪞", tag:"Fantasía", title:"El Espejo que Solo Funcionaba de Noche", desc:"Un espejo antiguo muestra el futuro, pero solo el de los próximos ocho horas.", time:"~12 min", len:"long",
    content:`<p>El espejo era oval, con marco de madera oscura y algunos puntos dorados que habían sido pan de oro en otro siglo. Colgaba en el dormitorio de la abuela Inés, y cuando Vera lo heredó a los dieciséis años, no le dio mayor importancia.</p><p>La primera noche que lo tuvo en su cuarto, a las doce pasadas, se levantó a beber agua y lo miró de reojo. Y vio algo que no era su reflejo: era ella misma, pero diferente. Con ropa que no se había puesto esa noche. Sentada en el desayuno de la mañana siguiente. Había un libro abierto en la mesa.</p><p>Vera parpadeó. La imagen desapareció.</p><p>La noche siguiente, a la misma hora, volvió a mirar. Y de nuevo vio el futuro inmediato: ella en el autobús al día siguiente, mirando por la ventana, con unos auriculares puestos. Exactamente como ocurrió al día siguiente.</p><h3>El límite del espejo</h3><p>Vera empezó a experimentar. El espejo no mostraba más allá de ocho horas. Solo el futuro inmediato, solo escenas cotidianas. Nada dramático, nada de grandes revelaciones. Solo: mañana desayunarás con el libro de historia abierto. Mañana perderás el autobús pero llegará otro a los cuatro minutos. Mañana tu madre te preguntará algo que no esperabas y no sabrás qué contestar.</p><p>Esas pequeñas visiones resultaron, curiosamente, tranquilizadoras. No porque Vera pudiera cambiar las cosas grandes. Sino porque el futuro inmediato, al verlo, siempre parecía manejable. Nunca apocalíptico. Solo... vida normal, continuando.</p><p>Una noche miró el espejo y se vio a sí misma dormida. Tranquila, con la respiración pausada, la almohada bien colocada. El futuro de las próximas ocho horas era: dormir bien.</p><p>Vera sonrió. Se metió en la cama. Y durmió exactamente como había visto: tranquila, profundamente, con la respiración pausada.</p><p>A veces, saber que el futuro inmediato es simplemente descanso es todo lo que uno necesita para dejarse ir.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🦚", tag:"Reflexión", title:"El Coleccionista de Silencios", desc:"Un chico aprende a valorar los distintos tipos de silencio que existen en el mundo.", time:"~11 min", len:"long",
    content:`<p>Martín vivía en una ciudad ruidosa. Coches, vecinos, música de bares, obras en la calle de al lado, notificaciones del teléfono, la televisión del salón que su padre ponía de fondo aunque nadie la mirara. Martín había crecido convencido de que el silencio era la ausencia de sonido y que, por tanto, era imposible.</p><p>Hasta que fue de excursión al campo con el instituto y, en un momento en que se separó del grupo, se quedó absolutamente solo en mitad de un prado.</p><p>Silencio.</p><p>No el silencio de la biblioteca, donde siempre hay alguien tosiendo o pasando páginas. No el silencio de la noche de la ciudad, donde siempre hay un coche lejano. Este era otro silencio. Tenía textura propia: el viento en la hierba, un pájaro a lo lejos, su propia respiración. Era un silencio lleno de cosas suaves.</p><h3>La colección</h3><p>Martín empezó a coleccionarlos. Anotaba en un cuaderno los distintos tipos de silencio que encontraba: el silencio de la biblioteca a las ocho de la mañana antes de que llegara nadie, el silencio del metro en el último vagón un domingo por la noche, el silencio de su cuarto a las tres de la madrugada cuando todo el mundo dormía.</p><p>Descubrió que cada silencio tenía sabor propio. El de la biblioteca sabía a concentración. El del metro a soledad voluntaria, que es diferente de la soledad impuesta. El de su cuarto a las tres de la madrugada tenía algo de secreto compartido con la noche.</p><p>Su favorito acabó siendo el silencio de los diez minutos antes de dormir, cuando apagaba el teléfono, dejaba el libro y simplemente estaba. Sin hacer nada. Sin esperar nada. Solo respirando.</p><p>Los primeros días le costó. Su mente corría hacia el día siguiente, hacia los mensajes no contestados, hacia las conversaciones que había tenido o no había tenido.</p><p>Pero con el tiempo, esos diez minutos se fueron vaciando solos. Y el silencio que encontró dentro de ellos era el más rico de su colección: el silencio de uno mismo cuando por fin deja de huir de sí mismo.</p><p>Y desde ese silencio, el sueño llegaba siempre.</p><div class="story-end">✦ · ✦</div>`
  },
  {
    emoji:"🌾", tag:"Reflexión", title:"Las Noches de la Cosecha", desc:"Una abuela y su nieta comparten tres noches de verano que ninguna olvidará.", time:"~13 min", len:"long",
    content:`<p>El pueblo de la abuela Lucía era tan pequeño que no aparecía en la mayoría de los mapas. Tenía doscientos habitantes en invierno y el doble en verano, cuando llegaban los nietos de todos. Elena tenía dieciséis años y ese verano fue el último que pasó allí: el siguiente tendría trabajo, el otro sus propios planes, y las cosas que uno hace sin pensar dejan de hacerse sin que nadie tome la decisión de que paren.</p><p>La abuela Lucía lo sabía. Por eso, las tres últimas noches de agosto, le propuso algo: —Quédate levantada conmigo hasta tarde. Hay cosas que solo se ven de noche.</p><h3>La primera noche</h3><p>Salieron al huerto a las once. La abuela le enseñó a escuchar cuándo el trigo estaba listo: había que pasar la mano por las espigas y notar si el grano soltaba. Le explicó que en su tiempo se cosechaba al amanecer, cuando el rocío todavía no había caído, para que el grano no se humedeciera.</p><p>—¿Por qué me cuentas esto? —preguntó Elena—. No voy a ser agricultora.</p><p>—No te lo cuento para que lo uses. Te lo cuento para que sepas de dónde venimos. Eso cambia cómo te mueves por el mundo.</p><h3>La segunda noche</h3><p>Sentadas en el porche, sin luz artificial, la abuela habló de sus padres: personas que Elena no había conocido, que habían vivido vidas completamente distintas a la de Elena y que sin embargo eran la razón de que Elena existiera. Nombres, historias, una fotografía que la abuela guardaba en el bolsillo de la bata.</p><p>Elena escuchó durante dos horas. No le pareció largo.</p><h3>La tercera noche</h3><p>La tercera noche no hablaron casi. Estuvieron sentadas en el campo, mirando las estrellas. La abuela señaló algunas constelaciones. Elena las buscó torpe con los ojos.</p><p>—Cuando ya no esté —dijo la abuela en un momento—, mira las estrellas. No porque yo esté ahí, que eso son cuentos. Sino porque la misma sensación de pequeñez y de pertenencia que sientes ahora, la sentí yo con mi madre, y ella con la suya. Es lo más continuo que hay.</p><p>Elena no contestó. Se quedó mirando el cielo un rato más. Luego apoyó la cabeza en el hombro de la abuela y cerró los ojos.</p><p>Se quedó dormida allí, al aire libre, bajo las estrellas.</p><p>La abuela no la movió. La tapó con una manta y se quedó a su lado hasta que el fresco del amanecer las despertó a las dos. Y ninguna de las dos habló de ello en lo que quedaba de verano, porque hay cosas que se estropean si se nombran demasiado.</p><div class="story-end">✦ · ✦</div>`
  }
]
};

/* ══ STATE ══ */
let currentAge = "2-4";
const ageLabelMap = { "2-4":"2–4 años · Bebés y peques", "4-7":"4–7 años · Primeros lectores", "7-10":"7–10 años · Aventureros", "10+":"10+ años · Grandes soñadores" };

/* ══ RENDER ══ */
function renderStories(age) {
  const grid = document.getElementById('storiesGrid');
  const list = stories[age] || [];
  grid.innerHTML = '';
  if (!list.length) { grid.innerHTML = `<div class="empty-state"><div class="es-icon">🌙</div><p>Pronto habrá más cuentos para esta edad.</p></div>`; return; }
  list.forEach((s, i) => {
    const lenText = { short:'Corto', medium:'Medio', long:'Largo' }[s.len];
    const card = document.createElement('div');
    card.className = 'story-card';
    card.setAttribute('role','button'); card.setAttribute('tabindex','0'); card.setAttribute('aria-label',`Leer: ${s.title}`);
    card.innerHTML = `
      <div class="ribbon ${s.len}">${lenText}</div>
      <div class="card-top">
        <div class="card-emoji">${s.emoji}</div>
        <div class="card-meta">
          <div class="card-tag">${s.tag}</div>
          <div class="card-title">${s.title}</div>
          <div class="card-desc">${s.desc}</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
      <div class="card-footer">
        <span class="card-time">🕐 ${s.time}</span>
        <span class="card-dot"></span>
        <span class="card-age">${age === "10+" ? "10+ años" : age + " años"}</span>
      </div>`;
    card.addEventListener('click', () => openStory(s, age));
    card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openStory(s,age); });
    grid.appendChild(card);
    requestAnimationFrame(() => setTimeout(() => card.classList.add('visible'), i * 60));
  });
  document.getElementById('ageLabel').textContent = ageLabelMap[age];
}

/* ══ TAB BAR ══ */
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
  btn.classList.add('active'); btn.setAttribute('aria-selected','true');
  currentAge = btn.dataset.age;
  renderStories(currentAge);
  window.scrollTo({ top:0, behavior:'smooth' });
});

/* ══ MODAL ══ */
const overlay  = document.getElementById('modalOverlay');
const sheet    = document.getElementById('modalSheet');
const closeBtn = document.getElementById('modalClose');

function openStory(s, age) {
  document.getElementById('modalEmoji').textContent = s.emoji;
  document.getElementById('modalTag').textContent   = s.tag;
  document.getElementById('modalTitle').textContent = s.title;
  document.getElementById('modalTime').textContent  = s.time + ' de lectura';
  document.getElementById('modalAge').textContent   = age === "10+" ? "10+ años" : age + " años";
  document.getElementById('modalBody').innerHTML    = s.content;
  overlay.classList.add('open');
  sheet.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeModal() { overlay.classList.remove('open'); document.body.style.overflow = ''; }

closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

let startY = 0;
sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive:true });
sheet.addEventListener('touchend',   e => { if (sheet.scrollTop===0 && e.changedTouches[0].clientY - startY > 70) closeModal(); }, { passive:true });

/* ══ STARS ══ */
const canvas = document.getElementById('stars-canvas');
const ctx    = canvas.getContext('2d');
let stars    = [];
function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; initStars(); }
function initStars() { stars=[]; const n=Math.floor((canvas.width*canvas.height)/5500); for(let i=0;i<n;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.3+0.15,o:Math.random()*0.7+0.1,speed:Math.random()*0.007+0.002,phase:Math.random()*Math.PI*2}); }
function drawStars(t) { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{const a=s.o*(0.55+0.45*Math.sin(t*s.speed+s.phase));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,220,255,${a})`;ctx.fill();}); requestAnimationFrame(drawStars); }
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(drawStars);

renderStories(currentAge);
</script>
</body>
